<style>

.daily-controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:5px 0 6px}.date-input{height:34px;min-width:138px;flex:1;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:var(--radius-sm);padding:0 8px;font-size:13px}.btn{height:34px;display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-weight:750;cursor:pointer;text-decoration:none}.btn:hover{background:var(--surface3)}.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}.btn.subtle{color:var(--muted)}.btn.warn{background:var(--amber-bg);color:var(--amber-text);border-color:rgba(255,167,38,.30)}
.texting-row{display:none;align-items:center;gap:6px;flex-wrap:wrap;margin:4px 0 10px}.text-hint{width:100%;font-size:11px;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:8px}.card-hd{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:8px 10px;border-bottom:1px solid var(--divider)}.card-title{font-size:15px;font-weight:820;letter-spacing:-.02em}.date-card .card-hd{border-bottom:0}.date-card .card-title{font-size:17px}.card-body{padding:6px 9px}.muted{color:var(--muted)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:44px;padding:2px 5px;border-radius:5px;background:var(--primary-bg);color:var(--primary);font-size:10px;font-weight:800;white-space:nowrap}.source-badge{font-size:8px;font-weight:740;color:var(--muted);border:1px solid var(--divider);border-radius:4px;padding:1px 4px;white-space:nowrap}
.unit-card .card-hd{padding:7px 10px}.unit-card .card-title{font-size:15px}.unit-row{display:grid;grid-template-columns:47px minmax(0,1fr) minmax(0,1fr);gap:6px;align-items:start;padding:5px 0;border-bottom:1px solid var(--divider)}.unit-row:last-child{border-bottom:0}.person-list{display:flex;flex-direction:column;gap:2px;min-height:16px}.person-chip{display:flex;align-items:center;gap:4px;min-height:17px;font-size:13px;font-weight:760;line-height:1.05}.name-link{color:var(--primary);text-decoration:none;border-radius:5px;padding:1px 2px}.name-link:hover,.name-link:focus{background:var(--primary-bg);color:var(--primary-h);outline:none}.provider-check{display:none;accent-color:var(--primary);width:12px;height:12px}.multi-mode .provider-check:not(:disabled){display:inline-block}
.resident-card .card-hd{padding:7px 10px;border-bottom:0}.resident-list{display:flex;flex-wrap:wrap;gap:5px;padding:0 9px 8px}.resident-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 6px;border:1px solid var(--divider);border-radius:var(--radius-sm);background:var(--surface2);font-size:13px;font-weight:760;line-height:1.05}
.coverage-card .card-hd{padding:7px 10px}.coverage-grid{display:grid;grid-template-columns:1fr;gap:5px}.coverage-row{display:grid;grid-template-columns:78px minmax(0,1fr);gap:6px;align-items:start;padding:6px 7px;border:1px solid var(--divider);border-radius:var(--radius-sm);background:var(--surface2)}.coverage-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}.coverage-value{font-size:13px;line-height:1.12;overflow-wrap:anywhere}.empty{padding:16px 10px;text-align:center;color:var(--muted);font-size:12px}
.calendar-controls{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:5px 0 8px}.calendar-title{font-size:19px;font-weight:830;letter-spacing:-.02em;text-align:center;flex:1}.calendar-key{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 8px;padding:6px 7px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface)}.key-item{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:750;color:var(--muted)}.key-dot{width:10px;height:10px;border-radius:3px;display:inline-block}.key-dot.acu{background:var(--acu)}.key-dot.ars{background:var(--ars)}.key-dot.res{background:var(--res)}.key-dot.other{background:var(--other)}
.calendar-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);background:var(--border)}.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(82px,1fr));gap:1px;min-width:590px}.cal-dow,.cal-cell{background:var(--surface)}.cal-dow{padding:6px 3px;text-align:center;font-size:9px;font-weight:820;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}.cal-cell{min-height:122px;padding:4px 4px 5px;overflow:hidden}.cal-cell.other-month{opacity:.42}.cal-cell.today{outline:2px solid var(--primary);outline-offset:-2px}.cal-date{font-size:12px;font-weight:830;margin-bottom:3px}.cal-names{display:flex;flex-direction:column;gap:1px}.cal-name{font-size:9.4px;line-height:1.02;font-weight:760;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:3px solid transparent;border-radius:3px;padding:1px 2px 1px 3px}.cal-name.acu{color:var(--acu);background:var(--acu-bg);border-left-color:var(--acu)}.cal-name.ars{color:var(--ars);background:var(--ars-bg);border-left-color:var(--ars)}.cal-name.res{color:var(--res);background:var(--res-bg);border-left-color:var(--res)}.cal-name.other{color:var(--other);background:var(--other-bg);border-left-color:var(--other)}
.toast{position:fixed;right:14px;bottom:14px;max-width:min(420px,calc(100vw - 28px));padding:10px 12px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);font-size:13px;color:var(--text);display:none;z-index:50}.toast.show{display:block}.system-status{display:none}
@media (max-width:700px){.app{padding:6px 8px 18px}.texting-row{display:flex}.btn{height:32px;font-size:12px;padding:0 8px}.date-input{height:32px;font-size:12px}.date-card .card-title{font-size:16px}.unit-row{grid-template-columns:43px minmax(0,1fr) minmax(0,1fr);gap:5px;padding:4px 0}.person-chip,.resident-pill,.coverage-value{font-size:12.5px}.badge{min-width:40px;font-size:9px;padding:2px 4px}.coverage-row{grid-template-columns:72px minmax(0,1fr)}.cal-grid{grid-template-columns:repeat(7,minmax(78px,1fr));min-width:546px}.cal-cell{min-height:118px}.cal-name{font-size:8.8px}.calendar-key{gap:6px}.key-item{font-size:10px}}
</style>
</head>
<body>
<main class="app">
  <nav class="tabs" aria-label="Schedule views">
    <button class="tab active" id="nav-daily" onclick="showView('daily')">Daily</button>
    <button class="tab" id="nav-calendar" onclick="showView('calendar')">Calendar</button>
  </nav>

  <section class="view active" id="view-daily">
    <div class="daily-controls">
      <button class="btn" onclick="moveDailyDate(-1)">Previous day</button>
      <input class="date-input" id="daily-date" type="date" onchange="setDailyDate(this.value)">
      <button class="btn" onclick="moveDailyDate(1)">Next day</button>
      <button class="btn subtle" onclick="jumpDailyToday()">Today</button>
    </div>
    <div class="texting-row">
      <span class="text-hint">Tap a name to text.</span>
      <a class="btn primary" id="text-all-btn" href="#" onclick="return handleTextAll()">Text all</a>
      <button class="btn" id="multi-toggle-btn" onclick="toggleMultiMode()">Text multiple</button>
      <a class="btn warn" id="text-selected-btn" href="#" onclick="return handleTextSelected()" style="display:none">Text selected</a>
    </div>
    <div id="daily-root"><div class="empty">Loading schedule...</div></div>
  </section>

  <section class="view" id="view-calendar">
    <div class="calendar-controls">
      <button class="btn" onclick="moveCalendarMonth(-1)">Previous</button>
      <div class="calendar-title" id="calendar-title"></div>
      <button class="btn" onclick="moveCalendarMonth(1)">Next</button>
    </div>
    <div class="calendar-key" aria-label="Calendar color key">
      <span class="key-item"><span class="key-dot acu"></span>ACU</span>
      <span class="key-item"><span class="key-dot ars"></span>ARS</span>
      <span class="key-item"><span class="key-dot res"></span>Residents/Fellows</span>
      <span class="key-item"><span class="key-dot other"></span>Other</span>
    </div>
    <div id="calendar-root"><div class="empty">Loading calendar...</div></div>
  </section>

  <div class="system-status"><span id="data-status"></span><span id="last-updated"></span></div>
</main>
<div class="toast" id="toast"></div>
<script>
const DRIVE_EXEC_URL='https://script.google.com/macros/s/AKfycbyMi0090cG0OpaW8vijCrijox-R1Y_d-4uGBbeg2Jq8KAYmICqctoF3ctZlqheHyEWC/exec';
const TODAY=new Date().toISOString().slice(0,10);

const CACHE_TIME_KEY='jfkMedStaffExperimentalCacheTime';

  {header:'Griffith, S',label:'Griffith',phone:'+19084033248'},
  {header:'Millonas, S',label:'Millonas',phone:'+18083914357'},
  {header:'Kuetemeyer',label:'Kuetemeyer',phone:'+12032531662'},
  {header:'Bandell',label:'Bandell',phone:'+14439287357',sourceLabel:'Medical column'},
  {header:'Nolan',label:'Nolan',phone:'+18284121095'},
  {header:'Moore',label:'Moore',phone:'+18284236673'},
  {header:'King',label:'King',phone:'+15018376887'},
  {header:'Edwards',label:'Edwards',phone:'+18289251696'},
  {header:'Ramirez',label:'Ramirez',phone:'+12034701369'},
  {header:'Poetter MD',label:'Poetter',phone:'+13365492166'},
  {header:'Dill MD',label:'Dill',phone:'+18285067870'},
  {header:'DeBell MD',label:'DeBell',phone:'+19703761182'},
  {header:'McKay MD',label:'McKay',phone:'+18286825479'},
  {header:'Wolf',label:'Wolf',phone:'+14102183110'}
];
const PSYCH_CORE_PROVIDERS=[
  {header:'Anderson',label:'Anderson',phone:'+19122222759'},
  {header:'Fowler',label:'Fowler',phone:'+13606061046'},
  {header:'Carter',label:'Carter',phone:'+19198641056'},
  {header:'Ondreyka',label:'Ondreyka',phone:'+17347091295'},
  {header:'Smith',label:'Smith',phone:'+18285513508'},
  {header:'Cooley',label:'Cooley',phone:'+19137102670'},
  {header:'Patil',label:'Patil',phone:'+14238029271'},
  {header:'German',label:'German',phone:'+13364651513'}
];
const PROVIDER_PHONES={Griffith:'+19084033248',Millonas:'+18083914357',Kuetemeyer:'+12032531662',Bandell:'+14439287357',Nolan:'+18284121095',Moore:'+18284236673',King:'+15018376887',Edwards:'+18289251696',Ramirez:'+12034701369',Poetter:'+13365492166',Dill:'+18285067870',DeBell:'+19703761182',McKay:'+18286825479',Wolf:'+14102183110',Fowler:'+13606061046',Ondreyka:'+17347091295',Carter:'+19198641056',Anderson:'+19122222759',Cooley:'+19137102670',Smith:'+18285513508',Wren:'+19098023352',Patil:'+14238029271',German:'+13364651513',Coburn:'+16173061134',Bennett:'+13362602926',Williams:'+19199153291',Eidson:'+18034132609',Tran:'+19808002145',Camiliere:'+14805861791',Dickerson:'+18137663257',Morales:'+18647048569'};
const UNIT_ORDER=['Team A','Team B','ARS-E','ARS-H','IN','Admin','SP','Flex'];
let RAW_HEADERS=[],RAW_ROWS=[],DATA=[],COLS={},dailyDate=TODAY,calendarYear=new Date().getFullYear(),calendarMonth=new Date().getMonth(),activeView='daily',multiMode=false,detectedPsychProviders=[];
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function normalizeHeader(value){return String(value||'').replace(/\.\d+$/,'').toLowerCase().replace(/[\r\n\s]+/g,' ').replace(/[^\w\s,]+/g,' ').replace(/\s+/g,' ').trim()}
function normalizeText(value){return String(value||'').replace(/\([^)]*\)/g,' ').replace(/[^\w\s/@.-]/g,' ').replace(/\s+/g,' ').trim().toUpperCase()}
function cleanDisplayName(header){let value=String(header||'').replace(/\.\d+$/,'').trim();value=value.replace(/\s+MD$/i,'');if(value.includes(','))value=value.split(',')[0].trim();return value}
function normalizePhone(value){const digits=String(value||'').replace(/\D/g,'');if(!digits)return'';if(digits.length===10)return'+1'+digits;if(digits.length===11&&digits.startsWith('1'))return'+'+digits;return'+'+digits}
function isSameProviderHeader(header,expected){const h=normalizeHeader(header),e=normalizeHeader(expected);return h===e||h.replace(/\s+md$/,'')===e.replace(/\s+md$/,'')}
function findFirstHeaderIndex(predicate,start=0,end=RAW_HEADERS.length){for(let i=Math.max(0,start);i<Math.min(end,RAW_HEADERS.length);i++){if(predicate(RAW_HEADERS[i],i))return i}return -1}
function findLastHeaderIndex(predicate){for(let i=RAW_HEADERS.length-1;i>=0;i--){if(predicate(RAW_HEADERS[i],i))return i}return -1}
function buildColumnMap(headers){
  RAW_HEADERS=headers||[];
  const dateCol=findFirstHeaderIndex(h=>normalizeHeader(h)==='date');
  const dayCol=findFirstHeaderIndex(h=>['day of week','day of the week','day'].includes(normalizeHeader(h)));
  const medResidentsCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('resident')||normalizeHeader(h).includes('fellowship'));
  const psychResidentsCol=findLastHeaderIndex(h=>normalizeHeader(h).includes('resident')||normalizeHeader(h).includes('fellowship'));
  const overnightCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('med staff overnight')||normalizeHeader(h).includes('overnight coverage'));
  const backupCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('back')&&normalizeHeader(h).includes('primary'));
  const clarificationCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('clarification')||normalizeHeader(h).includes('fast track'));
  const pharmacyCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('pharmacy'));
  const date2Col=findFirstHeaderIndex((h,i)=>i>psychResidentsCol&&normalizeHeader(h)==='date');
  const medicalProviders=MEDICAL_PROVIDERS.map(p=>({...p,id:'medical:'+p.label,group:'medical',sourceLabel:p.sourceLabel||'',col:findFirstHeaderIndex(h=>isSameProviderHeader(h,p.header),0,medResidentsCol>0?medResidentsCol:RAW_HEADERS.length)})).filter(p=>p.col>=0);
  const psychBandStart=pharmacyCol>=0?pharmacyCol+1:0;
  const psychBandEnd=psychResidentsCol>=0?psychResidentsCol:RAW_HEADERS.length;
  const psychCore=PSYCH_CORE_PROVIDERS.map(p=>({...p,id:'psych:'+p.label,group:'psych',sourceLabel:p.label==='Bandell'?'Psych column':'',col:findFirstHeaderIndex(h=>isSameProviderHeader(h,p.header),psychBandStart,psychBandEnd)})).filter(p=>p.col>=0);
  const tempStart=psychResidentsCol>=0?psychResidentsCol+1:RAW_HEADERS.length;
  const tempEnd=date2Col>=0?date2Col:RAW_HEADERS.length;
  const skip=new Set([dateCol,dayCol,medResidentsCol,psychResidentsCol,overnightCol,backupCol,clarificationCol,pharmacyCol,date2Col].filter(i=>i>=0));
  const tempCols=[];
  for(let i=tempStart;i<tempEnd;i++){
    if(skip.has(i))continue;
    const raw=RAW_HEADERS[i],n=normalizeHeader(raw);
    if(!n||n.length<2)continue;
    if(/(date|day|overnight|back|pharmacy|fast|clarif|resident|fellow|call|coverage)/i.test(n))continue;
    if(!/^[a-z][a-z\s,'-]+$/.test(n))continue;
    const label=cleanDisplayName(raw);
    if(!label||psychCore.some(p=>p.label===label))continue;
    tempCols.push({header:raw,label,phone:PROVIDER_PHONES[label]||'',id:'psych:'+label+':'+i,group:'psych',col:i,temp:true,sourceLabel:label==='Bandell'?'Psych column':''});
  }
  detectedPsychProviders=[...psychCore,...tempCols];
  return{date:dateCol,day:dayCol,medResidents:medResidentsCol,psychResidents:psychResidentsCol,overnight:overnightCol,backup:backupCol,clarification:clarificationCol,pharmacy:pharmacyCol,medicalProviders,psychProviders:detectedPsychProviders};
}
function parseDateValue(value){if(value===null||value===undefined)return'';const s=String(value).trim();if(!s)return'';let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return`${m[1]}-${m[2]}-${m[3]}`;m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);if(m){const y=m[3].length===2?'20'+m[3]:m[3];return`${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`}const d=new Date(s);if(!Number.isNaN(d.getTime()))return d.toISOString().slice(0,10);return''}
function fmtDate(iso){if(!iso)return'--';const d=new Date(iso+'T12:00:00');if(Number.isNaN(d.getTime()))return iso;return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}
function compactAssignmentLabel(value){return String(value||'').replace(/\bHOL\s*\(\s*Req(?:ue|u)sted\s+Off\s*\)/ig,'HOL (off)')}
function isPostCall(value){const n=normalizeText(value);return n.includes('POST CALL')||n.includes('POST-CALL')||n.includes('POSTCALL')||n.split(' ').includes('PC')}
function dailyAssignmentCategory(value){
  const n=normalizeText(value);
  if(!n||isPostCall(n))return null;
  if(['OFF','VAC','HOL','OUT','NO CALL','OFF NO CALL','CME','CPI','CSL','EPIC','GOV','JURY','RHA','ORIENT'].includes(n))return null;
  if(/\b(OFF|VAC|HOL|OUT|NO CALL|CME|CPI|CSL|EPIC|GOV|JURY|RHA|ORIENT)\b/.test(n))return null;
  if(n.includes('TEAM A'))return'Team A';
  if(n.includes('TEAM B'))return'Team B';
  if(n.includes('ARS-E'))return'ARS-E';
  if(n.includes('ARS-H'))return'ARS-H';
  if(/\bARS\b/.test(n))return'ARS-E';
  if(/\bADMIN\b/.test(n)||/\bWFH\b/.test(n))return'Admin';
  if(/\bSP\b/.test(n))return'SP';
  if(/\bFLEX\b/.test(n))return'Flex';
  if(/\bIN\b/.test(n)||/\bACU\b/.test(n)||/\bJFK\b/.test(n)||/\bBROUGHTON\b/.test(n)||/\bPRN\b/.test(n)||n.includes('FAST TRACK'))return'IN';
  return null;

function providerAssignment(record,provider){if(!record||provider.col<0)return'';return String(record.row[provider.col]||'').trim()}
function extractResidentTokens(raw){const text=String(raw||'').trim();if(!text)return[];return text.split(/[\/,;]+/).map(t=>t.trim().replace(/\s+(AM|PM)\b.*$/i,'').replace(/[\s.;,]+$/,'').trim()).filter(Boolean).map(t=>{const m=t.match(/^([A-Za-z][A-Za-z'\-\s.]*?)(?:\s*\-\s*([RF]))?\b/i);if(!m)return t;return m[1].trim().replace(/\s+/g,' ')+(m[2]?'-'+m[2].toUpperCase():'')})}
function buildDataFromJson(json){
  RAW_HEADERS=json.headers||[];RAW_ROWS=json.rows||[];COLS=buildColumnMap(RAW_HEADERS);
  DATA=RAW_ROWS.map(row=>{const date=parseDateValue(row[COLS.date]);if(!date)return null;return{row,date,day:String(row[COLS.day]||''),medResidentsRaw:COLS.medResidents>=0?String(row[COLS.medResidents]||'').trim():'',psychResidentsRaw:COLS.psychResidents>=0?String(row[COLS.psychResidents]||'').trim():'',overnight:COLS.overnight>=0?String(row[COLS.overnight]||'').trim():'',backup:COLS.backup>=0?String(row[COLS.backup]||'').trim():'',clarification:COLS.clarification>=0?String(row[COLS.clarification]||'').trim():'',pharmacy:COLS.pharmacy>=0?String(row[COLS.pharmacy]||'').trim():''}}).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));
  const preferred=DATA.find(r=>r.date===TODAY)||DATA.find(r=>r.date>=TODAY)||DATA[DATA.length-1]||DATA[0];
  if(preferred){dailyDate=preferred.date;const d=new Date(preferred.date+'T12:00:00');calendarYear=d.getFullYear();calendarMonth=d.getMonth()}
}
function updateStatus(json,source){const status=document.getElementById('data-status'),updated=document.getElementById('last-updated');if(status)status.textContent=source||'';if(updated)updated.textContent=json?.fetchedAt||''}
async function loadFromDrive(manual=false){try{const url=DRIVE_EXEC_URL+(DRIVE_EXEC_URL.includes('?')?'&':'?')+'_cb='+Date.now();const res=await fetch(url);if(!res.ok)throw new Error('HTTP '+res.status);const json=await res.json();if(json.error)throw new Error(json.error);localStorage.setItem(CACHE_KEY,JSON.stringify(json));localStorage.setItem(CACHE_TIME_KEY,json.fetchedAt||new Date().toISOString());buildDataFromJson(json);updateStatus(json,'Live Google Sheet');initializeUI();renderAll();if(manual)showToast('Schedule refreshed.')}catch(err){const cached=localStorage.getItem(CACHE_KEY);if(cached){const json=JSON.parse(cached);buildDataFromJson(json);updateStatus(json,'Cached data');initializeUI();renderAll();showToast('Live load failed; using cached data.');return}document.getElementById('daily-root').innerHTML='<div class="empty">Error loading schedule data.</div>';document.getElementById('calendar-root').innerHTML='<div class="empty">Error loading calendar data.</div>'}}
function initializeUI(){const input=document.getElementById('daily-date');if(input){input.value=dailyDate;if(DATA.length){input.min=DATA[0].date;input.max=DATA[DATA.length-1].date}}}
function showView(id){activeView=id;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('nav-'+id).classList.add('active');renderAll()}
function renderAll(){renderDailySchedule();renderCalendar()}
function getRecordByDate(iso=dailyDate){return DATA.find(r=>r.date===iso)||null}
function unitIndex(category){const i=UNIT_ORDER.indexOf(category);return i<0?999:i}
// Daily Schedule migration notes: display ARS/Admin/SP/Flex; sort Team A, Team B, ARS-E, ARS-H, IN, Admin, SP, Flex; preserve medical-vs-psych Bandell by source column.
function dailyProvidersFor(record,providers,groupLabel){if(!record)return[];return providers.map((p,idx)=>{const assignment=providerAssignment(record,p),category=dailyAssignmentCategory(assignment);if(!category)return null;return{name:p.label,assignment:compactAssignmentLabel(assignment),phone:p.phone||PROVIDER_PHONES[p.label]||'',group:groupLabel,id:p.id,category,sourceLabel:p.sourceLabel||'',order:idx}}).filter(Boolean).sort((a,b)=>(unitIndex(a.category)-unitIndex(b.category))||(a.order-b.order)||a.name.localeCompare(b.name))}
function residentEntries(raw,groupLabel){return extractResidentTokens(raw).map(token=>{const display=token.replace(/-[RF]$/,'');return{name:token,assignment:groupLabel,phone:PROVIDER_PHONES[display]||'',group:'Residents / Fellowships',id:'resident:'+token}})}
function dailyData(record){const psych=dailyProvidersFor(record,COLS.psychProviders||[],'Psychiatry Staff'),medical=dailyProvidersFor(record,COLS.medicalProviders||[],'Medical Staff'),residents=[...residentEntries(record.medResidentsRaw,'Medical resident/fellow'),...residentEntries(record.psychResidentsRaw,'Psych resident/fellow')].filter(item=>item.name);return{psych,medical,residents}}
function allDailyPeople(record){if(!record)return[];const d=dailyData(record);return[...d.psych,...d.medical,...d.residents.filter(item=>item.phone)]}
function uniquePhones(items){return[...new Set(items.map(item=>normalizePhone(item.phone||item)).filter(Boolean))]}
function renderPersonChip(person){if(!person)return'';const checkbox=person.phone?`<input class="provider-check" type="checkbox" value="${escapeHtml(person.phone)}">`:'';const name=person.phone?`<a class="name-link" href="sms:${escapeHtml(person.phone)}">${escapeHtml(person.name)}</a>`:`<span>${escapeHtml(person.name)}</span>`;const source=person.sourceLabel?`<span class="source-badge">${escapeHtml(person.sourceLabel)}</span>`:'';return`<span class="person-chip">${checkbox}${name}${source}</span>`}
function renderPeopleList(people){return people.length?`<div class="person-list">${people.map(renderPersonChip).join('')}</div>`:'<div class="person-list"></div>'}
function renderUnitCard(title,cats,psych,medical){const rows=cats.map(cat=>{const psychPeople=psych.filter(p=>p.category===cat),medicalPeople=medical.filter(p=>p.category===cat);if(!psychPeople.length&&!medicalPeople.length)return'';return`<div class="unit-row"><div><span class="badge">${escapeHtml(cat)}</span></div><div>${renderPeopleList(psychPeople)}</div><div>${renderPeopleList(medicalPeople)}</div></div>`}).filter(Boolean).join('');if(!rows)return'';return`<div class="card unit-card"><div class="card-hd"><div class="card-title">${escapeHtml(title)}</div></div><div class="card-body">${rows}</div></div>`}
function renderResidentsSlim(residents){const rows=residents.length?residents.map(r=>{const checkbox=r.phone?`<input class="provider-check" type="checkbox" value="${escapeHtml(r.phone)}">`:'';const name=r.phone?`<a class="name-link" href="sms:${escapeHtml(r.phone)}">${escapeHtml(r.name)}</a>`:`<span>${escapeHtml(r.name)}</span>`;return`<span class="resident-pill">${checkbox}${name}</span>`}).join(''):'<span class="muted">No residents or fellows listed.</span>';return`<div class="card resident-card"><div class="card-hd"><div class="card-title">Residents / Fellows</div></div><div class="resident-list">${rows}</div></div>`}
function renderCoverageDetails(record){const items=[['Overnight',record?.overnight],['Backup',record?.backup],['Fast Track',record?.clarification],['Pharmacy',record?.pharmacy]].filter(([,value])=>String(value||'').trim());if(!items.length)return'';const rows=items.map(([label,value])=>`<div class="coverage-row"><div class="coverage-label">${escapeHtml(label)}</div><div class="coverage-value">${escapeHtml(compactAssignmentLabel(value))}</div></div>`).join('');return`<div class="card coverage-card"><div class="card-hd"><div class="card-title">Coverage</div></div><div class="card-body"><div class="coverage-grid">${rows}</div></div></div>`}
function renderDailySchedule(){const root=document.getElementById('daily-root'),input=document.getElementById('daily-date');if(input&&input.value!==dailyDate)input.value=dailyDate;const record=getRecordByDate(dailyDate);if(!record){root.innerHTML='<div class="empty">No schedule data found for selected date.</div>';return}const d=dailyData(record),allTextable=allDailyPeople(record).filter(p=>p.phone),textAllBtn=document.getElementById('text-all-btn');textAllBtn.href=allTextable.length?smsHref(allTextable.map(p=>p.phone)):'#';textAllBtn.classList.toggle('subtle',!allTextable.length);document.getElementById('text-selected-btn').style.display=multiMode?'inline-flex':'none';document.getElementById('multi-toggle-btn').textContent=multiMode?'Cancel':'Text multiple';const acu=renderUnitCard('ACU',['Team A','Team B','IN','Admin'],d.psych,d.medical);const ars=renderUnitCard('ARS',['ARS-E','ARS-H'],d.psych,d.medical);const other=renderUnitCard('Other',['SP','Flex'],d.psych,d.medical);root.innerHTML=`<div class="card date-card"><div class="card-hd"><div class="card-title">${escapeHtml(fmtDate(record.date))}</div></div></div>${acu||'<div class="card unit-card"><div class="card-hd"><div class="card-title">ACU</div></div><div class="card-body"><div class="empty">No ACU assignments.</div></div></div>'}${ars}${renderResidentsSlim(d.residents)}${other}${renderCoverageDetails(record)}`;root.classList.toggle('multi-mode',multiMode)}
function setDailyDate(value){if(!value)return;dailyDate=value;renderDailySchedule()}
function moveDailyDate(delta){if(!dailyDate)return;const d=new Date(dailyDate+'T12:00:00');d.setDate(d.getDate()+delta);dailyDate=d.toISOString().slice(0,10);renderDailySchedule()}
function jumpDailyToday(){const preferred=DATA.find(r=>r.date===TODAY)||DATA.find(r=>r.date>=TODAY)||DATA[0];if(preferred)dailyDate=preferred.date;renderDailySchedule()}
function smsHref(numbers){const cleaned=uniquePhones(numbers);return cleaned.length?'sms:'+cleaned.join(','):'#'}
function handleTextAll(){const record=getRecordByDate(dailyDate),numbers=allDailyPeople(record).map(p=>p.phone).filter(Boolean);if(!numbers.length){showToast('No textable providers for this date.');return false}document.getElementById('text-all-btn').href=smsHref(numbers);return true}
function toggleMultiMode(){multiMode=!multiMode;renderDailySchedule()}
function handleTextSelected(){const checked=[...document.querySelectorAll('#daily-root .provider-check:checked')].map(cb=>cb.value).filter(Boolean);if(!checked.length){showToast('Select at least one provider with a phone number.');return false}document.getElementById('text-selected-btn').href=smsHref(checked);return true}
function calendarNamesFor(record){if(!record)return[];const d=dailyData(record),names=[];const pushForCats=(cats,type)=>{for(const cat of cats){d.psych.filter(p=>p.category===cat).forEach(p=>names.push({name:p.name,type}));d.medical.filter(p=>p.category===cat).forEach(p=>names.push({name:p.name,type}))}};pushForCats(['Team A','Team B','IN','Admin'],'acu');pushForCats(['ARS-E','ARS-H'],'ars');d.residents.forEach(r=>names.push({name:r.name,type:'res'}));pushForCats(['SP','Flex'],'other');return names}
function renderCalendar(){const root=document.getElementById('calendar-root'),title=document.getElementById('calendar-title'),first=new Date(calendarYear,calendarMonth,1);title.textContent=first.toLocaleDateString('en-US',{month:'long',year:'numeric'});const start=new Date(calendarYear,calendarMonth,1);start.setDate(1-start.getDay());const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('');const cells=[];for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const iso=d.toISOString().slice(0,10);const record=getRecordByDate(iso);const names=calendarNamesFor(record);const nameHtml=names.map(item=>`<div class="cal-name ${escapeHtml(item.type)}">${escapeHtml(item.name)}</div>`).join('');cells.push(`<div class="cal-cell ${d.getMonth()!==calendarMonth?'other-month':''} ${iso===TODAY?'today':''}" onclick="dailyDate='${iso}';showView('daily')"><div class="cal-date">${d.getDate()}</div><div class="cal-names">${nameHtml}</div></div>`)}root.innerHTML=`<div class="calendar-wrap"><div class="cal-grid">${dows}${cells.join('')}</div></div>`}
function moveCalendarMonth(delta){calendarMonth+=delta;if(calendarMonth<0){calendarMonth=11;calendarYear--}if(calendarMonth>11){calendarMonth=0;calendarYear++}renderCalendar()}
function toggleTheme(){const html=document.documentElement,next=html.getAttribute('data-theme')==='dark'?'light':'dark';html.setAttribute('data-theme',next);localStorage.setItem('jfkMedStaffExperimentalTheme',next)}
function showToast(message){const toast=document.getElementById('toast');toast.textContent=message;toast.classList.add('show');clearTimeout(showToast._timer);showToast._timer=setTimeout(()=>toast.classList.remove('show'),3000)}
(function init(){const theme=localStorage.getItem('jfkMedStaffExperimentalTheme');if(theme)document.documentElement.setAttribute('data-theme',theme);loadFromDrive(false)})();
</script>
