<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>JFK Schedule Login</title>
<style>
:root{color-scheme:light;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f3ee;color:#12171b}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#f7f4ed 0%,#e9eef2 100%)}
main{width:min(380px,100%);background:#fff;border:1px solid rgba(18,23,27,.12);border-radius:8px;padding:22px;box-shadow:0 18px 45px rgba(18,23,27,.12)}
h1{font-size:22px;line-height:1.2;margin:0 0 8px;font-weight:780}
p{margin:0 0 16px;color:#55606a;font-size:14px;line-height:1.45}
label{display:block;font-size:13px;font-weight:700;margin-bottom:7px}
input{width:100%;height:44px;border:1px solid #bcc6cf;border-radius:7px;padding:0 11px;font-size:17px;background:#fff;color:#111}
button{width:100%;height:44px;margin-top:12px;border:0;border-radius:7px;background:#1f6fd5;color:#fff;font-size:15px;font-weight:780;cursor:pointer}
button:disabled{opacity:.65;cursor:not-allowed}
.status{min-height:20px;margin-top:11px;font-size:13px;color:#a3371f}
</style>
</head>
<body>
<main>
<h1>JFK Med Staff Schedule</h1>
<p>Enter the shared password to continue.</p>
<form id="login-form">
<label for="password">Password</label>
<input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
<button id="submit" type="submit">Unlock</button>
<div class="status" id="status" role="status" aria-live="polite"></div>
</form>
</main>
<script>
const form=document.getElementById('login-form');
const password=document.getElementById('password');
const submit=document.getElementById('submit');
const status=document.getElementById('status');
function nextPath(){
  const raw=new URLSearchParams(location.search).get('next')||'/';
  try{
    const url=new URL(raw,location.origin);
    return url.origin===location.origin?url.pathname+url.search+url.hash:'/';
  }catch(e){return '/'}
}
form.addEventListener('submit',async e=>{
  e.preventDefault();
  status.textContent='';
  submit.disabled=true;
  submit.textContent='Checking...';
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:password.value})});
    if(!res.ok)throw new Error('bad-password');
    location.assign(nextPath());
  }catch(err){
    status.textContent='That password did not work.';
    password.select();
  }finally{
    submit.disabled=false;
    submit.textContent='Unlock';
  }
});
</script>
</body>
</html>
