name: Build JFK v2 Schedule APK

on:
  push:
    branches:
      - main
      - 'codex/**'
    paths:
      - 'jfk-med-staff-schedule-experimental-v2.html'
      - 'android-jfk-v2/**'
      - '.github/workflows/build-jfk-v2-apk.yml'
  pull_request:
    paths:
      - 'jfk-med-staff-schedule-experimental-v2.html'
      - 'android-jfk-v2/**'
      - '.github/workflows/build-jfk-v2-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK with native widget
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Sync JFK v2 page into Capacitor web bundle
        working-directory: android-jfk-v2
        run: |
          mkdir -p www
          cp ../jfk-med-staff-schedule-experimental-v2.html www/index.html
          cp ../icon-192.png ../icon-512.png www/

      - name: Install Capacitor dependencies
        working-directory: android-jfk-v2
        run: npm install --no-audit --no-fund

      - name: Add Android platform
        working-directory: android-jfk-v2
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Add native widget source and resources
        working-directory: android-jfk-v2
        run: |
          set -euo pipefail
          PACKAGE_DIR="android/app/src/main/java/com/troyfowlermd/jfkmedstaffschedule"
          mkdir -p "$PACKAGE_DIR"
          cp native/java/*.java "$PACKAGE_DIR"/
          cp -R native/res/* android/app/src/main/res/

          python - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          if "android.permission.INTERNET" not in text:
              text = text.replace(
                  "<application",
                  '    <uses-permission android:name="android.permission.INTERNET" />\n\n    <application',
                  1,
              )
          widget_components = '''
              <receiver
                  android:name=".JfkScheduleWidgetProvider"
                  android:exported="true">
                  <intent-filter>
                      <action android:name="android.appwidget.action.APPWIDGET_UPDATE" />
                      <action android:name="com.troyfowlermd.jfkmedstaffschedule.action.REFRESH" />
                      <action android:name="com.troyfowlermd.jfkmedstaffschedule.action.PREVIOUS_DAY" />
                      <action android:name="com.troyfowlermd.jfkmedstaffschedule.action.NEXT_DAY" />
                  </intent-filter>
                  <meta-data
                      android:name="android.appwidget.provider"
                      android:resource="@xml/jfk_schedule_widget_info" />
              </receiver>

              <service
                  android:name=".JfkScheduleWidgetService"
                  android:permission="android.permission.BIND_REMOTEVIEWS"
                  android:exported="false" />
          '''
          if "JfkScheduleWidgetProvider" not in text:
              text = text.replace("</application>", widget_components + "\n    </application>", 1)
          manifest.write_text(text)

          gradle = Path("android/app/build.gradle")
          build = gradle.read_text()
          if "androidx.work:work-runtime" not in build:
              marker = "dependencies {"
              if marker not in build:
                  raise RuntimeError("Could not find Gradle dependencies block")
              additions = (
                  "dependencies {\n"
                  "    implementation 'androidx.work:work-runtime:2.9.1'\n"
                  "    implementation 'androidx.annotation:annotation:1.8.2'"
              )
              build = build.replace(marker, additions, 1)
          gradle.write_text(build)
          PY

      - name: Write local.properties
        working-directory: android-jfk-v2/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant gradlew execute permission
        working-directory: android-jfk-v2/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-jfk-v2/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Confirm widget receiver and INTERNET permission
        working-directory: android-jfk-v2
        run: |
          test -f android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' android/app/src/main/AndroidManifest.xml
          grep -q 'JfkScheduleWidgetProvider' android/app/src/main/AndroidManifest.xml
          grep -q 'JfkScheduleWidgetService' android/app/src/main/AndroidManifest.xml

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android-jfk-v2/android/app/build/outputs/apk/debug/app-debug.apk dist/jfk-v2-schedule-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jfk-v2-schedule-apk
          path: dist/jfk-v2-schedule-debug.apk
          retention-days: 90
