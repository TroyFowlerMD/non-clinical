name: Build Five Crowns APK

on:
  push:
    branches: [main]
    paths:
      - 'five-crowns.html'
      - 'manifest.json'
      - 'icon-192.png'
      - 'icon-512.png'
      - 'android-build/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK (offline Capacitor wrapper)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Sync five-crowns.html into www/
        working-directory: android-build
        run: |
          mkdir -p www
          # Rewrite absolute /non-clinical/ paths so the HTML works offline inside the APK
          sed 's|/non-clinical/manifest.json|./manifest.json|g; s|/non-clinical/|./|g' ../five-crowns.html > www/index.html
          cp ../icon-192.png ../icon-512.png www/
          cat > www/manifest.json <<'EOF'
          {
            "name": "Five Crowns Scorekeeper",
            "short_name": "Five Crowns",
            "description": "Score tracker for the Five Crowns card game.",
            "start_url": "./index.html",
            "scope": "./",
            "display": "standalone",
            "orientation": "portrait",
            "background_color": "#f0f4f8",
            "theme_color": "#2563eb",
            "icons": [
              { "src": "icon-192.png", "sizes": "192x192", "type": "image/png", "purpose": "any maskable" },
              { "src": "icon-512.png", "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }
            ]
          }
          EOF

      - name: Install Capacitor deps
        working-directory: android-build
        run: npm install --no-audit --no-fund

      - name: Add Android platform
        working-directory: android-build
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Write local.properties
        working-directory: android-build/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant gradlew execute permission
        working-directory: android-build/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-build/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android-build/android/app/build/outputs/apk/debug/app-debug.apk dist/five-crowns-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: five-crowns-apk
          path: dist/five-crowns-debug.apk
          retention-days: 90
