name: Build Dog Whistle APK

on:
  push:
    paths:
      - "dog-whistle-android/**"
      - ".github/workflows/build-dog-whistle-apk.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dog-whistle-android

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dog-whistle-debug-apk
          path: dog-whistle-android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
