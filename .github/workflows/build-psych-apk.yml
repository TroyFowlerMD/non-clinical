name: Build Psych Scheduler APK

on:
  push:
    branches: [main]
    paths:
      - 'psych-scheduler.html'
      - 'android-build/**'
      - '.github/workflows/build-psych-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK (Capacitor wrapper)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Sync psych-scheduler.html into www/
        working-directory: android-build
        run: |
          mkdir -p www
          cp ../psych-scheduler.html www/index.html

      - name: Install Capacitor deps
        working-directory: android-build
        run: npm install --no-audit --no-fund

      - name: Ensure Capacitor app config for Psych Scheduler
        working-directory: android-build
        run: |
          cat > capacitor.config.json <<'EOF_CFG'
          {
            "appId": "com.troyfowlermd.psychscheduler",
            "appName": "Psych Scheduler",
            "webDir": "www"
          }
          EOF_CFG

      - name: Add Android platform
        working-directory: android-build
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Ensure INTERNET permission in AndroidManifest.xml
        working-directory: android-build
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i '/<application/i\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi

      - name: Write local.properties
        working-directory: android-build/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant gradlew execute permission
        working-directory: android-build/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-build/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android-build/android/app/build/outputs/apk/debug/app-debug.apk dist/psych-scheduler-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: psych-scheduler-apk
          path: dist/psych-scheduler-debug.apk
          retention-days: 90
