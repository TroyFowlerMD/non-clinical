<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JFK Schedule v2</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #12171b; color: #f7f5ef; font-family: Inter, system-ui, sans-serif; }
  .loader { max-width: 32rem; padding: 1rem; line-height: 1.45; text-align: center; }
</style>
</head>
<body>
<div class="loader" id="loader">Loading JFK Schedule v2…</div>
<script>
(async () => {
  const sourceUrl = 'https://raw.githubusercontent.com/TroyFowlerMD/non-clinical/38342bc153895531180e5be62569432a19e2bafe/jfk-med-staff-schedule-experimental-v2.html';
  const otpPhoneCss = '#otp-results .dir-phone{font-size:calc(11px * var(--scale));line-height:1.12;margin-top:4px;white-space:nowrap;overflow:visible;text-overflow:clip}#otp-results .dir-phone a{display:inline-block;min-height:22px;line-height:1.12}@media (max-width:560px){#otp-results .dir-phone{font-size:calc(10px * var(--scale))}}';

  const cacheKey = 'jfkScheduleV2SourceHtml:38342bc153895531180e5be62569432a19e2bafe';
  let html = '';
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) html = cached;
  } catch (e) {}

  if (!html) {
    const response = await fetch(sourceUrl, { cache: 'force-cache' });
    if (!response.ok) throw new Error('Could not load app source: HTTP ' + response.status);
    html = await response.text();
    try { localStorage.setItem(cacheKey, html); } catch (e) {}
  }

  if (!html.includes('#otp-results .dir-phone')) {
    html = html.replace('</style>', otpPhoneCss + '\n</style>');
  }

  document.open();
  document.write(html);
  document.close();
})().catch(error => {
  const loader = document.getElementById('loader');
  loader.textContent = 'Could not load JFK Schedule v2. Please refresh or try again later. ' + error.message;
});
</script>
</body>
</html>
