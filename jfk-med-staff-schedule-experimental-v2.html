<main class="app">
  <header class="topbar">

    <nav class="tabs" aria-label="Main navigation"><button class="tab active" id="tab-schedule" onclick="showMain('schedule')">Schedule</button><button class="tab" id="tab-directory" onclick="showMain('directory')">Directory</button></nav>
  </header>

  <section class="view active" id="view-schedule">
    <div class="date-nav"><button class="nav-arrow" onclick="moveDailyDate(-1)">‹</button><div class="date-title" id="daily-title">Loading...</div><button class="nav-arrow" onclick="moveDailyDate(1)">›</button></div>
    <div class="mode-switch"><button id="mode-daily" class="active" onclick="showScheduleMode('daily')">Daily</button><button id="mode-month" onclick="showScheduleMode('month')">Month</button></div>
    <div class="subview active" id="subview-daily">
      <div class="group-bar" id="group-bar"><span class="group-hint">Tap a name for text, call, or group text options on mobile.</span><button class="btn" onclick="enableGroupMode()">Group text</button><div class="group-actions"><button class="btn" id="select-all-btn" onclick="selectAllVisible()">Select all</button><a class="btn primary" id="group-start-btn" href="#" onclick="return startGroupText()">Start group text</a><button class="btn warn" id="cancel-group-btn" onclick="cancelGroupMode()">Cancel</button></div></div>
      <div id="daily-root"><div class="empty">Loading schedule...</div></div>
    </div>
    <div class="subview" id="subview-month">
      <div class="month-controls"><button class="nav-arrow" onclick="moveCalendarMonth(-1)">‹</button><div class="month-title" id="month-title"></div><button class="nav-arrow" onclick="moveCalendarMonth(1)">›</button></div>
      <div class="calendar-key"><span class="key-item"><span class="key-dot acu"></span>ACU</span><span class="key-item"><span class="key-dot ars"></span>ARS</span><span class="key-item"><span class="key-dot res"></span>Residents/Fellows</span><span class="key-item"><span class="key-dot other"></span>Other</span></div>
      <div id="calendar-root"><div class="empty">Loading calendar...</div></div>
    </div>
  </section>

  <section class="view" id="view-directory"><div id="directory-root"><div class="empty">Loading directory...</div></div></section>
  <div class="system-status"><span id="data-status"></span><span id="last-updated"></span></div>
</main>
<div class="sheet" id="contact-sheet" onclick="closeContactSheet(event)"><div class="sheet-card" onclick="event.stopPropagation()"><div class="sheet-title" id="sheet-name"></div><div class="sheet-sub" id="sheet-phone"></div><div class="sheet-actions"><a id="sheet-text" class="primary" href="#">Text</a><a id="sheet-call" href="#">Call</a><button onclick="addSheetContactToGroup()">Add to group text</button><button onclick="hideContactSheet()">Cancel</button></div></div></div>

function dailyAssignmentCategory(v){const n=normalizeText(v);if(!n||isPostCall(n))return null;if(['OFF','VAC','HOL','OUT','NO CALL','OFF NO CALL','CME','CPI','CSL','EPIC','GOV','JURY','RHA','ORIENT'].includes(n))return null;if(/\b(OFF|VAC|HOL|OUT|NO CALL|CME|CPI|CSL|EPIC|GOV|JURY|RHA|ORIENT)\b/.test(n))return null;if(n.includes('TEAM A'))return'Team A';if(n.includes('TEAM B'))return'Team B';if(n.includes('ARS-E'))return'ARS-E';if(n.includes('ARS-H'))return'ARS-H';if(/\bARS\b/.test(n))return'ARS-E';if(/\bADMIN\b/.test(n)||/\bWFH\b/.test(n))return'Admin';if(/\bSP\b/.test(n))return'SP';if(/\bFLEX\b/.test(n))return'Flex';if(/\bIN\b/.test(n)||/\bACU\b/.test(n)||/\bJFK\b/.test(n)||/\bBROUGHTON\b/.test(n)||/\bPRN\b/.test(n)||n.includes('FAST TRACK'))return'IN';return null}
function providerAssignment(record,p){return(!record||p.col<0)?'':String(record.row[p.col]||'').trim()}
function extractResidentTokens(raw){return String(raw||'').split(/[\/,;]+/).map(t=>t.trim().replace(/\s+(AM|PM)\b.*$/i,'').replace(/[\s.;,]+$/,'').trim()).filter(Boolean).map(t=>{const m=t.match(/^([A-Za-z][A-Za-z'\-\s.]*?)(?:\s*\-\s*([RF]))?\b/i);if(!m)return displayName(t);return displayName(m[1].trim())+(m[2]?'-'+m[2].toUpperCase():'')})}
function buildDataFromJson(json){RAW_HEADERS=json.headers||[];RAW_ROWS=json.rows||[];COLS=buildColumnMap(RAW_HEADERS);DATA=RAW_ROWS.map(row=>{const date=parseDateValue(row[COLS.date]);if(!date)return null;return{row,date,day:String(row[COLS.day]||''),medResidentsRaw:COLS.medResidents>=0?String(row[COLS.medResidents]||'').trim():'',psychResidentsRaw:COLS.psychResidents>=0?String(row[COLS.psychResidents]||'').trim():'',overnight:COLS.overnight>=0?String(row[COLS.overnight]||'').trim():'',backup:COLS.backup>=0?String(row[COLS.backup]||'').trim():'',clarification:COLS.clarification>=0?String(row[COLS.clarification]||'').trim():'',pharmacy:COLS.pharmacy>=0?String(row[COLS.pharmacy]||'').trim():''}}).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));const preferred=DATA.find(r=>r.date===TODAY)||DATA.find(r=>r.date>=TODAY)||DATA[DATA.length-1]||DATA[0];if(preferred){dailyDate=preferred.date;const d=new Date(preferred.date+'T12:00:00');calendarYear=d.getFullYear();calendarMonth=d.getMonth()}}
async function loadFromDrive(){try{const res=await fetch(DRIVE_EXEC_URL+(DRIVE_EXEC_URL.includes('?')?'&':'?')+'_cb='+Date.now());if(!res.ok)throw new Error('HTTP '+res.status);const json=await res.json();if(json.error)throw new Error(json.error);localStorage.setItem(CACHE_KEY,JSON.stringify(json));localStorage.setItem(CACHE_TIME_KEY,json.fetchedAt||new Date().toISOString());buildDataFromJson(json);renderAll()}catch(err){const cached=localStorage.getItem(CACHE_KEY);if(cached){buildDataFromJson(JSON.parse(cached));renderAll();showToast('Using cached schedule data.');return}document.getElementById('daily-root').innerHTML='<div class="empty">Error loading schedule.</div>'}}
function getRecordByDate(iso=dailyDate){return DATA.find(r=>r.date===iso)||null}
function unitIndex(c){const i=UNIT_ORDER.indexOf(c);return i<0?999:i}
function dailyProvidersFor(record,providers,groupLabel){if(!record)return[];return providers.map((p,idx)=>{const assignment=providerAssignment(record,p),category=dailyAssignmentCategory(assignment);if(!category)return null;return{name:displayName(p.label),assignment:compactAssignmentLabel(assignment),phone:p.phone||PROVIDER_PHONES[p.label]||'',group:groupLabel,id:p.id,category,sourceLabel:p.sourceLabel||'',order:idx}}).filter(Boolean).sort((a,b)=>(unitIndex(a.category)-unitIndex(b.category))||(a.order-b.order)||a.name.localeCompare(b.name))}
function residentEntries(raw,groupLabel){return extractResidentTokens(raw).map(token=>{const display=token.replace(/-[RF]$/,'');return{name:token,assignment:groupLabel,phone:PROVIDER_PHONES[display]||'',group:'Residents / Fellows',id:'resident:'+token}})}
function dailyData(record){const psych=dailyProvidersFor(record,COLS.psychProviders||[],'Psychiatry'),medical=dailyProvidersFor(record,COLS.medicalProviders||[],'Medical'),residents=[...residentEntries(record.medResidentsRaw,'Medical'),...residentEntries(record.psychResidentsRaw,'Psych')].filter(x=>x.name);return{psych,medical,residents}}
function personButton(p){if(!p)return'';const checked=selectedPhones.has(normalizePhone(p.phone));const cb=p.phone?`<input class="contact-check" data-phone="${escapeHtml(normalizePhone(p.phone))}" onchange="syncSelectionFromCheckboxes()" type="checkbox" ${checked?'checked':''}>`:'';const cls=p.phone?'person-name has-phone':'person-name';const source=p.sourceLabel?`<span class="source-badge">${escapeHtml(p.sourceLabel)}</span>`:'';return`<span class="person">${cb}<button class="${cls}" onclick="openContact('${escapeHtml(p.name)}','${escapeHtml(normalizePhone(p.phone))}')">${escapeHtml(p.name)}</button>${source}</span>`}
function peopleList(arr){return`<div class="person-list">${arr.map(personButton).join('')}</div>`}
function unitRows(cats,psych,medical){return cats.map(cat=>{const p=psych.filter(x=>x.category===cat),m=medical.filter(x=>x.category===cat);if(!p.length&&!m.length)return'';return`<div class="ledger-row"><div class="row-label">${escapeHtml(cat)}</div>${peopleList(p)}${peopleList(m)}</div>`}).join('')}
function section(title,cls,body){if(!body)return'';return`<section class="section ${cls}"><div class="section-head">${escapeHtml(title)}</div><div class="ledger">${body}</div></section>`}
function coverageTokens(value){return String(value||'').split(/[\/,;]+/).map(x=>displayName(x.trim())).filter(Boolean)}
function coverageRow(label,value){const toks=coverageTokens(value);if(!toks.length)return'';const html=toks.map(name=>{const phone=normalizePhone(PROVIDER_PHONES[name]||'');if(phone){const checked=selectedPhones.has(phone);return`<span class="coverage-token"><input class="contact-check" data-phone="${escapeHtml(phone)}" onchange="syncSelectionFromCheckboxes()" type="checkbox" ${checked?'checked':''}><button class="person-name has-phone" onclick="openContact('${escapeHtml(name)}','${escapeHtml(phone)}')">${escapeHtml(name)}</button></span>`}return`<span class="coverage-token"><span class="person-name">${escapeHtml(name)}</span></span>`}).join('');return`<div class="ledger-row"><div class="row-label">${escapeHtml(label)}</div><div class="coverage-value">${html}</div></div>`}
function renderDaily(){const root=document.getElementById('daily-root'),record=getRecordByDate(dailyDate);document.getElementById('daily-title').textContent=record?fmtDate(record.date):'No date';if(!record){root.innerHTML='<div class="empty">No schedule data found.</div>';return}const d=dailyData(record);let html='';html+=section('ACU','acu',unitRows(['Team A','Team B','IN','Admin'],d.psych,d.medical));html+=section('ARS','ars',unitRows(['ARS-E','ARS-H'],d.psych,d.medical));html+=section('Residents / Fellows','res',d.residents.length?`<div class="ledger-row"><div class="row-label">Roster</div>${peopleList(d.residents)}<div></div></div>`:'');html+=section('Other','other',unitRows(['SP','Flex'],d.psych,d.medical));const cov=coverageRow('Overnight',record.overnight)+coverageRow('Backup',record.backup)+coverageRow('Fast Track',record.clarification)+coverageRow('Pharmacy',record.pharmacy);html+=section('Coverage','coverage',cov);root.innerHTML=html||'<div class="empty">No displayable assignments.</div>';document.body.classList.toggle('group-mode',groupMode)}
function calendarItems(record){if(!record)return[];const d=dailyData(record),items=[];const push=(cats,type)=>{for(const cat of cats){d.psych.filter(p=>p.category===cat).forEach(p=>items.push({name:p.name,type}));d.medical.filter(p=>p.category===cat).forEach(p=>items.push({name:p.name,type}))}};push(['Team A','Team B','IN','Admin'],'acu');push(['ARS-E','ARS-H'],'ars');d.residents.forEach(r=>items.push({name:r.name,type:'res'}));push(['SP','Flex'],'other');return items}
function renderCalendar(){const root=document.getElementById('calendar-root'),title=document.getElementById('month-title'),first=new Date(calendarYear,calendarMonth,1);title.textContent=first.toLocaleDateString('en-US',{month:'long',year:'numeric'});const start=new Date(calendarYear,calendarMonth,1);start.setDate(1-start.getDay());const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('');let cells='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const iso=d.toISOString().slice(0,10),record=getRecordByDate(iso),items=calendarItems(record);cells+=`<div class="cal-cell ${d.getMonth()!==calendarMonth?'other-month':''} ${iso===TODAY?'today':''}" onclick="dailyDate='${iso}';showScheduleMode('daily')"><div class="cal-date">${d.getDate()}</div><div class="cal-names">${items.map(item=>`<div class="cal-name ${item.type}">${escapeHtml(item.name)}</div>`).join('')}</div></div>`}root.innerHTML=`<div class="calendar-wrap"><div class="cal-grid">${dows}${cells}</div></div>`}
function renderDirectory(){const root=document.getElementById('directory-root'),seen=new Set(),items=[];const add=(name,phone,role)=>{const key=name+'|'+phone;if(seen.has(key))return;seen.add(key);items.push({name:displayName(name),phone:normalizePhone(phone),role})};MEDICAL_PROVIDERS.forEach(p=>add(p.label,p.phone,'Medical Staff'));PSYCH_CORE_PROVIDERS.forEach(p=>add(p.label,p.phone,'Psychiatry Staff'));Object.entries(PROVIDER_PHONES).forEach(([name,phone])=>add(name,phone,'Available phone'));items.sort((a,b)=>a.name.localeCompare(b.name));root.innerHTML=`<div class="directory-list">${items.map(x=>`<div class="dir-card"><div><button class="person-name has-phone dir-name" onclick="openContact('${escapeHtml(x.name)}','${escapeHtml(x.phone)}')">${escapeHtml(x.name)}</button><div class="dir-meta">${escapeHtml(x.role)}</div></div><div class="dir-phone">${escapeHtml(x.phone)}</div></div>`).join('')}</div>`}
function renderAll(){renderDaily();renderCalendar();renderDirectory()}
function showMain(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active')}
function showScheduleMode(mode){scheduleMode=mode;document.querySelectorAll('.subview').forEach(v=>v.classList.remove('active'));document.getElementById('subview-'+mode).classList.add('active');document.getElementById('mode-daily').classList.toggle('active',mode==='daily');document.getElementById('mode-month').classList.toggle('active',mode==='month');showMain('schedule');renderAll()}
function moveDailyDate(delta){const d=new Date(dailyDate+'T12:00:00');d.setDate(d.getDate()+delta);dailyDate=d.toISOString().slice(0,10);renderDaily()}
function moveCalendarMonth(delta){calendarMonth+=delta;if(calendarMonth<0){calendarMonth=11;calendarYear--}if(calendarMonth>11){calendarMonth=0;calendarYear++}renderCalendar()}
function openContact(name,phone){if(!phone)return;if(!isMobileContact())return;sheetContact={name,phone};document.getElementById('sheet-name').textContent=name;document.getElementById('sheet-phone').textContent=phone;document.getElementById('sheet-text').href='sms:'+phone;document.getElementById('sheet-call').href='tel:'+phone;document.getElementById('contact-sheet').classList.add('show')}
function hideContactSheet(){document.getElementById('contact-sheet').classList.remove('show')}function closeContactSheet(e){if(e.target.id==='contact-sheet')hideContactSheet()}
function addSheetContactToGroup(){if(sheetContact){selectedPhones.add(normalizePhone(sheetContact.phone));groupMode=true;hideContactSheet();renderDaily();showToast(sheetContact.name+' added to group text.')}}
function enableGroupMode(){groupMode=true;renderDaily()}function cancelGroupMode(){groupMode=false;selectedPhones.clear();renderDaily()}function syncSelectionFromCheckboxes(){selectedPhones=new Set([...document.querySelectorAll('.contact-check:checked')].map(cb=>normalizePhone(cb.dataset.phone)).filter(Boolean))}
function selectAllVisible(){document.querySelectorAll('.contact-check').forEach(cb=>{if(!cb.disabled)cb.checked=true});syncSelectionFromCheckboxes()}
function startGroupText(){syncSelectionFromCheckboxes();const nums=[...selectedPhones];if(!nums.length){showToast('Select at least one person.');return false}document.getElementById('group-start-btn').href='sms:'+nums.join(',');return true}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>t.classList.remove('show'),3000)}
loadFromDrive();
</script>
