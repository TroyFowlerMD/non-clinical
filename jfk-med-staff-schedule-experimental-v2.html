<body>
<main class="app" id="app">
  <header class="topbar">
    <div class="brand-row"><button class="icon-btn" aria-label="Menu" onclick="toggleMenu(true)">≡</button><button class="top-nav-arrow" aria-label="Previous day" onclick="moveDailyDate(-1)">‹</button><div class="screen-title" id="screen-title">Loading...</div><button class="top-nav-arrow" aria-label="Next day" onclick="moveDailyDate(1)">›</button></div>
  </header>

  <section class="view active" id="view-schedule">
    <div class="mode-switch"><button id="mode-daily" class="active" onclick="showScheduleMode('daily')">Daily</button><button id="mode-month" onclick="showScheduleMode('month')">Month</button></div>
    <div class="subview active daily-swipe" id="subview-daily">
      <div class="group-bar" id="group-bar"><span class="group-hint">Tap a name for text, call, or group text options on mobile.</span><button class="btn" onclick="enableGroupMode()">Group text</button><div class="group-actions"><button class="btn" id="select-all-btn" onclick="selectAllVisible()">Select all</button><a class="btn primary" id="group-start-btn" href="#" onclick="return startGroupText()">Start group text</a><button class="btn warn" id="cancel-group-btn" onclick="cancelGroupMode()">Cancel</button></div></div>
      <div id="daily-root"><div class="empty">Loading schedule...</div></div>
    </div>
    <div class="subview" id="subview-month">
      <div class="month-controls"><button class="nav-arrow" onclick="moveCalendarMonth(-1)">‹</button><div class="month-title" id="month-title"></div><button class="nav-arrow" onclick="moveCalendarMonth(1)">›</button></div>
      <div class="calendar-key"><span class="key-item"><span class="key-dot acu"></span>ACU</span><span class="key-item"><span class="key-dot ars"></span>ARS</span><span class="key-item"><span class="key-dot res"></span>Residents/Fellows</span><span class="key-item"><span class="key-dot other"></span>Other</span></div>
      <div id="calendar-root"><div class="empty">Loading calendar...</div></div>
    </div>
  </section>

  <section class="view" id="view-directory"><div id="directory-root"><div class="empty">Loading directory...</div></div></section>
  <footer class="data-foot" id="data-foot">Schedule data as of —</footer>
  <input type="file" id="schedule-file-input" accept=".xlsx,.xls,.csv,.tsv,.txt" style="display:none" onchange="handleScheduleFile(this.files[0])">
  <div class="system-status"><span id="data-status"></span><span id="last-updated"></span></div>
</main>
<div class="menu" id="menu" onclick="closeMenuFromBackdrop(event)"><div class="menu-panel" onclick="event.stopPropagation()"><div class="menu-title">Menu</div><button class="menu-btn" onclick="showMain('schedule');toggleMenu(false)">Schedule</button><button class="menu-btn" onclick="showMain('directory');toggleMenu(false)">Directory</button><button class="menu-btn" onclick="triggerScheduleUpload()">Upload latest schedule file</button><button class="menu-btn" onclick="openFeedback();toggleMenu(false)">Feedback</button><div class="menu-section">Text size</div><div class="font-row"><button class="menu-btn" onclick="adjustTextSize(-.08)">A−</button><button class="menu-btn" onclick="adjustTextSize(.08)">A+</button></div></div></div>
<div class="sheet" id="contact-sheet" onclick="closeContactSheet(event)"><div class="sheet-card" onclick="event.stopPropagation()"><div class="sheet-title" id="sheet-name"></div><div class="sheet-sub" id="sheet-phone"></div><div class="sheet-actions"><a id="sheet-text" class="primary" href="#">Text</a><a id="sheet-call" href="#">Call</a><button onclick="addSheetContactToGroup()">Add to group text</button><button onclick="hideContactSheet()">Cancel</button></div></div></div>
<div class="modal" id="feedback-modal" onclick="closeFeedbackFromBackdrop(event)"><div class="modal-card" onclick="event.stopPropagation()"><div class="modal-title">Feedback</div><div class="modal-sub">Send a note about this schedule page.</div><textarea class="feedback-box" id="feedback-text" placeholder="What should be changed or improved?"></textarea><div class="modal-actions"><button onclick="hideFeedback()">Cancel</button><button class="primary" onclick="submitFeedback()">Send</button></div></div></div>

function buildColumnMap(headers){RAW_HEADERS=headers||[];const dateCol=findFirstHeaderIndex(h=>normalizeHeader(h)==='date'),dayCol=findFirstHeaderIndex(h=>['day of week','day of the week','day'].includes(normalizeHeader(h))),medResidentsCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('resident')||normalizeHeader(h).includes('fellowship')),psychResidentsCol=findLastHeaderIndex(h=>normalizeHeader(h).includes('resident')||normalizeHeader(h).includes('fellowship')),overnightCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('med staff overnight')||normalizeHeader(h).includes('overnight coverage')),backupCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('back')&&normalizeHeader(h).includes('primary')),clarificationCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('clarification')||normalizeHeader(h).includes('fast track')),pharmacyCol=findFirstHeaderIndex(h=>normalizeHeader(h).includes('pharmacy')),date2Col=findFirstHeaderIndex((h,i)=>i>psychResidentsCol&&normalizeHeader(h)==='date');
const medicalProviders=MEDICAL_PROVIDERS.map(p=>({...p,label:displayName(p.label),id:'medical:'+p.label,group:'medical',sourceLabel:p.sourceLabel||'',col:findFirstHeaderIndex(h=>isSameProviderHeader(h,p.header),0,medResidentsCol>0?medResidentsCol:RAW_HEADERS.length)})).filter(p=>p.col>=0);const psychBandStart=pharmacyCol>=0?pharmacyCol+1:0,psychBandEnd=psychResidentsCol>=0?psychResidentsCol:RAW_HEADERS.length;const psychCore=PSYCH_CORE_PROVIDERS.map(p=>({...p,label:displayName(p.label),id:'psych:'+p.label,group:'psych',sourceLabel:p.label==='Bandell'?'Psych column':'',col:findFirstHeaderIndex(h=>isSameProviderHeader(h,p.header),psychBandStart,psychBandEnd)})).filter(p=>p.col>=0);const tempStart=psychResidentsCol>=0?psychResidentsCol+1:RAW_HEADERS.length,tempEnd=date2Col>=0?date2Col:RAW_HEADERS.length,skip=new Set([dateCol,dayCol,medResidentsCol,psychResidentsCol,overnightCol,backupCol,clarificationCol,pharmacyCol,date2Col].filter(i=>i>=0)),tempCols=[];for(let i=tempStart;i<tempEnd;i++){if(skip.has(i))continue;const raw=RAW_HEADERS[i],n=normalizeHeader(raw);if(!n||n.length<2)continue;if(/(date|day|overnight|back|pharmacy|fast|clarif|resident|fellow|call|coverage)/i.test(n))continue;if(!/^[a-z][a-z\s,'-]+$/.test(n))continue;const label=cleanDisplayName(raw);if(!label||psychCore.some(p=>p.label===label))continue;tempCols.push({header:raw,label,phone:PROVIDER_PHONES[label]||'',id:'psych:'+label+':'+i,group:'psych',col:i,temp:true,sourceLabel:label==='Bandell'?'Psych column':''})}detectedPsychProviders=[...psychCore,...tempCols];return{date:dateCol,day:dayCol,medResidents:medResidentsCol,psychResidents:psychResidentsCol,overnight:overnightCol,backup:backupCol,clarification:clarificationCol,pharmacy:pharmacyCol,medicalProviders,psychProviders:detectedPsychProviders}}
function parseDateValue(v){if(v==null)return'';const s=String(v).trim();if(!s)return'';let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return`${m[1]}-${m[2]}-${m[3]}`;m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);if(m){const y=m[3].length===2?'20'+m[3]:m[3];return`${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`}const d=new Date(s);return Number.isNaN(d.getTime())?'':d.toISOString().slice(0,10)}
function fmtDate(iso){if(!iso)return'--';const d=new Date(iso+'T12:00:00');return Number.isNaN(d.getTime())?iso:d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
function fmtShortTitle(iso){if(scheduleMode==='month')return new Date(calendarYear,calendarMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});if(activeView==='directory')return'Directory';const d=new Date(iso+'T12:00:00');return Number.isNaN(d.getTime())?'Schedule':d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function fmtAsOf(value){if(!value)return'—';const d=new Date(value);return Number.isNaN(d.getTime())?String(value):d.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}
function updateDataFooter(){const foot=document.getElementById('data-foot');const label=dataSourceMeta.label?` · ${dataSourceMeta.label}`:'';foot.innerHTML=`Schedule data as of <strong>${escapeHtml(fmtAsOf(dataSourceMeta.asOf))}</strong>${escapeHtml(label)}`}
function compactAssignmentLabel(v){return String(v||'').replace(/\bHOL\s*\(\s*Req(?:ue|u)sted\s+Off\s*\)/ig,'HOL (off)')}
function isPostCall(v){const n=normalizeText(v);return n.includes('POST CALL')||n.includes('POST-CALL')||n.includes('POSTCALL')||n.split(' ').includes('PC')}
function dailyAssignmentCategory(v){const n=normalizeText(v);if(!n||isPostCall(n))return null;if(['OFF','VAC','HOL','OUT','NO CALL','OFF NO CALL','CME','CPI','CSL','EPIC','GOV','JURY','RHA','ORIENT'].includes(n))return null;if(/\b(OFF|VAC|HOL|OUT|NO CALL|CME|CPI|CSL|EPIC|GOV|JURY|RHA|ORIENT)\b/.test(n))return null;if(n.includes('TEAM A'))return'Team A';if(n.includes('TEAM B'))return'Team B';if(n.includes('ARS-E'))return'ARS-E';if(n.includes('ARS-H'))return'ARS-H';if(/\bARS\b/.test(n))return'ARS-E';if(/\bADMIN\b/.test(n)||/\bWFH\b/.test(n))return'Admin';if(/\bSP\b/.test(n))return'SP';if(/\bFLEX\b/.test(n))return'Flex';if(/\bIN\b/.test(n)||/\bACU\b/.test(n)||/\bJFK\b/.test(n)||/\bBROUGHTON\b/.test(n)||/\bPRN\b/.test(n)||n.includes('FAST TRACK'))return'IN';return null}
function providerAssignment(record,p){return(!record||p.col<0)?'':String(record.row[p.col]||'').trim()}
function extractResidentTokens(raw){return String(raw||'').split(/[\/,;]+/).map(t=>t.trim().replace(/\s+(AM|PM)\b.*$/i,'').replace(/[\s.;,]+$/,'').trim()).filter(Boolean).map(t=>{const m=t.match(/^([A-Za-z][A-Za-z'\-\s.]*?)(?:\s*\-\s*([RF]))?\b/i);if(!m)return displayName(t);return displayName(m[1].trim())+(m[2]?'-'+m[2].toUpperCase():'')})}
function buildDataFromJson(json,meta={}){RAW_HEADERS=json.headers||[];RAW_ROWS=json.rows||[];COLS=buildColumnMap(RAW_HEADERS);DATA=RAW_ROWS.map(row=>{const date=parseDateValue(row[COLS.date]);if(!date)return null;return{row,date,day:String(row[COLS.day]||''),medResidentsRaw:COLS.medResidents>=0?String(row[COLS.medResidents]||'').trim():'',psychResidentsRaw:COLS.psychResidents>=0?String(row[COLS.psychResidents]||'').trim():'',overnight:COLS.overnight>=0?String(row[COLS.overnight]||'').trim():'',backup:COLS.backup>=0?String(row[COLS.backup]||'').trim():'',clarification:COLS.clarification>=0?String(row[COLS.clarification]||'').trim():'',pharmacy:COLS.pharmacy>=0?String(row[COLS.pharmacy]||'').trim():''}}).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));const preferred=DATA.find(r=>r.date===TODAY)||DATA.find(r=>r.date>=TODAY)||DATA[DATA.length-1]||DATA[0];if(preferred){dailyDate=preferred.date;const d=new Date(preferred.date+'T12:00:00');calendarYear=d.getFullYear();calendarMonth=d.getMonth()}dataSourceMeta={source:meta.source||'drive',asOf:meta.asOf||json.updatedAt||json.modifiedTime||json.lastModified||json.lastUpdated||json.fetchedAt||new Date().toISOString(),label:meta.label||''};localStorage.setItem(CACHE_META_KEY,JSON.stringify(dataSourceMeta));updateDataFooter()}
async function loadFromDrive(){try{const res=await fetch(DRIVE_EXEC_URL+(DRIVE_EXEC_URL.includes('?')?'&':'?')+'_cb='+Date.now());if(!res.ok)throw new Error('HTTP '+res.status);const json=await res.json();if(json.error)throw new Error(json.error);localStorage.setItem(CACHE_KEY,JSON.stringify(json));localStorage.setItem(CACHE_TIME_KEY,json.fetchedAt||new Date().toISOString());buildDataFromJson(json,{source:'drive',label:'Google Sheet'});renderAll()}catch(err){const cached=localStorage.getItem(CACHE_KEY);if(cached){const meta=JSON.parse(localStorage.getItem(CACHE_META_KEY)||'{}');buildDataFromJson(JSON.parse(cached),meta);renderAll();showToast('Using cached schedule data.');return}document.getElementById('daily-root').innerHTML='<div class="empty">Error loading schedule.</div>'}}
function parseDelimited(text){const rows=[];let row=[],cell='',quote=false;for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1];if(ch==='"'){if(quote&&next==='"'){cell+='"';i++}else quote=!quote}else if(!quote&&(ch===','||ch==='\t')){row.push(cell);cell=''}else if(!quote&&(ch==='\n'||ch==='\r')){if(ch==='\r'&&next==='\n')i++;row.push(cell);if(row.some(v=>String(v).trim()!==''))rows.push(row);row=[];cell=''}else cell+=ch}row.push(cell);if(row.some(v=>String(v).trim()!==''))rows.push(row);return rows}
function rowsToScheduleJson(rows){const clean=rows.map(r=>r.map(v=>String(v??'').trim())).filter(r=>r.some(Boolean));if(clean.length<2)throw new Error('File did not contain enough rows.');return{headers:clean[0],rows:clean.slice(1),fetchedAt:new Date().toISOString()}}
function triggerScheduleUpload(){toggleMenu(false);document.getElementById('schedule-file-input').value='';document.getElementById('schedule-file-input').click()}
function handleScheduleFile(file){if(!file)return;const asOf=file.lastModified?new Date(file.lastModified).toISOString():new Date().toISOString();const label='Uploaded file: '+file.name;if(/\.(xlsx|xls)$/i.test(file.name)){if(!window.XLSX){showToast('Spreadsheet parser unavailable. Try CSV export.');return}const reader=new FileReader();reader.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const sheet=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:''});const json=rowsToScheduleJson(rows);localStorage.setItem(CACHE_KEY,JSON.stringify(json));buildDataFromJson(json,{source:'upload',asOf,label});renderAll();showMain('schedule');showToast('Uploaded schedule file loaded.')}catch(err){showToast('Could not parse upload: '+err.message)}};reader.readAsArrayBuffer(file);return}const reader=new FileReader();reader.onload=e=>{try{const json=rowsToScheduleJson(parseDelimited(e.target.result));localStorage.setItem(CACHE_KEY,JSON.stringify(json));buildDataFromJson(json,{source:'upload',asOf,label});renderAll();showMain('schedule');showToast('Uploaded schedule file loaded.')}catch(err){showToast('Could not parse upload: '+err.message)}};reader.readAsText(file)}
function getRecordByDate(iso=dailyDate){return DATA.find(r=>r.date===iso)||null}
function unitIndex(c){const i=UNIT_ORDER.indexOf(c);return i<0?999:i}
function dailyProvidersFor(record,providers,groupLabel){if(!record)return[];return providers.map((p,idx)=>{const assignment=providerAssignment(record,p),category=dailyAssignmentCategory(assignment);if(!category)return null;return{name:displayName(p.label),assignment:compactAssignmentLabel(assignment),phone:p.phone||PROVIDER_PHONES[p.label]||'',group:groupLabel,id:p.id,category,sourceLabel:p.sourceLabel||'',order:idx}}).filter(Boolean).sort((a,b)=>(unitIndex(a.category)-unitIndex(b.category))||(a.order-b.order)||a.name.localeCompare(b.name))}
function residentEntries(raw,groupLabel){return extractResidentTokens(raw).map(token=>{const display=token.replace(/-[RF]$/,'');return{name:token,assignment:groupLabel,phone:PROVIDER_PHONES[display]||'',group:'Residents / Fellows',id:'resident:'+token}})}
function dailyData(record){const psych=dailyProvidersFor(record,COLS.psychProviders||[],'Psychiatry'),medical=dailyProvidersFor(record,COLS.medicalProviders||[],'Medical'),medResidents=residentEntries(record.medResidentsRaw,'Medical'),psychResidents=residentEntries(record.psychResidentsRaw,'Psych');return{psych,medical,medResidents,psychResidents,residents:[...medResidents,...psychResidents].filter(x=>x.name)}}
function personButton(p){if(!p)return'';const phone=normalizePhone(p.phone),checked=selectedPhones.has(phone);const cb=phone?`<input class="contact-check" data-phone="${escapeHtml(phone)}" onchange="syncSelectionFromCheckboxes()" type="checkbox" ${checked?'checked':''}>`:'';const cls=phone?'person-name has-phone':'person-name';const source=p.sourceLabel?`<span class="source-badge">${escapeHtml(p.sourceLabel)}</span>`:'';return`<span class="person">${cb}<button class="${cls}" data-name="${escapeHtml(p.name)}" data-phone="${escapeHtml(phone)}" onclick="openContactFromElement(this)">${escapeHtml(p.name)}</button>${source}</span>`}
function peopleList(arr){return`<div class="person-list">${arr.map(personButton).join('')}</div>`}
function unitRows(cats,psych,medical){return cats.map(cat=>{const p=psych.filter(x=>x.category===cat),m=medical.filter(x=>x.category===cat);if(!p.length&&!m.length)return'';return`<div class="ledger-row"><div class="row-label">${escapeHtml(cat)}</div>${peopleList(p)}${peopleList(m)}</div>`}).join('')}
function section(title,cls,body,columns=true){if(!body)return'';const head=columns?`<div class="section-head"><div class="section-title">${escapeHtml(title)}</div><div class="section-col">Psych</div><div class="section-col">Medical</div></div>`:`<div class="section-head"><div class="section-title">${escapeHtml(title)}</div></div>`;return`<section class="section ${cls} ${columns?'':'single'}">${head}<div class="ledger">${body}</div></section>`}
function coverageTokens(value){return String(value||'').split(/[\/,;]+/).map(x=>displayName(x.trim())).filter(Boolean)}
function coverageRow(label,value){const toks=coverageTokens(value);if(!toks.length)return'';const html=toks.map(name=>{const phone=normalizePhone(PROVIDER_PHONES[name]||'');if(phone){const checked=selectedPhones.has(phone);return`<span class="coverage-token"><input class="contact-check" data-phone="${escapeHtml(phone)}" onchange="syncSelectionFromCheckboxes()" type="checkbox" ${checked?'checked':''}><button class="person-name has-phone" data-name="${escapeHtml(name)}" data-phone="${escapeHtml(phone)}" onclick="openContactFromElement(this)">${escapeHtml(name)}</button></span>`}return`<span class="coverage-token"><span class="person-name">${escapeHtml(name)}</span></span>`}).join('');return`<div class="ledger-row"><div class="row-label">${escapeHtml(label)}</div><div class="coverage-value">${html}</div></div>`}
function renderDaily(){const root=document.getElementById('daily-root'),record=getRecordByDate(dailyDate);updateScreenTitle();updateDataFooter();if(!record){root.innerHTML='<div class="empty">No schedule data found.</div>';return}const d=dailyData(record);let html='';html+=section('ACU','acu',unitRows(['Team A','Team B'],d.psych,d.medical));html+=section('ARS','ars',unitRows(['ARS-E','ARS-H'],d.psych,d.medical));html+=section('Residents / Fellows','res',`<div class="ledger-row"><div class="row-label">Roster</div>${peopleList(d.psychResidents)}${peopleList(d.medResidents)}</div>`);html+=section('Other','other',unitRows(['IN','Admin','SP','Flex'],d.psych,d.medical));const cov=coverageRow('Overnight',record.overnight)+coverageRow('Backup',record.backup)+coverageRow('Fast Track',record.clarification)+coverageRow('Pharmacy',record.pharmacy);html+=section('Coverage','coverage',cov,false);root.innerHTML=html||'<div class="empty">No displayable assignments.</div>';document.body.classList.toggle('group-mode',groupMode)}
function calendarItems(record){if(!record)return[];const d=dailyData(record),items=[];const push=(cats,type)=>{for(const cat of cats){d.psych.filter(p=>p.category===cat).forEach(p=>items.push({name:p.name,type}));d.medical.filter(p=>p.category===cat).forEach(p=>items.push({name:p.name,type}))}};push(['Team A','Team B'],'acu');push(['ARS-E','ARS-H'],'ars');d.psychResidents.forEach(r=>items.push({name:r.name,type:'res'}));d.medResidents.forEach(r=>items.push({name:r.name,type:'res'}));push(['IN','Admin','SP','Flex'],'other');return items}
function renderCalendar(){const root=document.getElementById('calendar-root'),title=document.getElementById('month-title'),first=new Date(calendarYear,calendarMonth,1);title.textContent=first.toLocaleDateString('en-US',{month:'long',year:'numeric'});updateScreenTitle();updateDataFooter();const start=new Date(calendarYear,calendarMonth,1);start.setDate(1-start.getDay());const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('');let cells='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const iso=d.toISOString().slice(0,10),record=getRecordByDate(iso),items=calendarItems(record);cells+=`<div class="cal-cell ${d.getMonth()!==calendarMonth?'other-month':''} ${iso===TODAY?'today':''}" onclick="dailyDate='${iso}';showScheduleMode('daily')"><div class="cal-date">${d.getDate()}</div><div class="cal-names">${items.map(item=>`<div class="cal-name ${item.type}">${escapeHtml(item.name)}</div>`).join('')}</div></div>`}root.innerHTML=`<div class="calendar-wrap"><div class="cal-grid">${dows}${cells}</div></div>`}
function renderDirectory(){const root=document.getElementById('directory-root'),seen=new Set(),items=[];const add=(name,phone,role)=>{const clean=displayName(name),norm=normalizePhone(phone),key=clean+'|'+norm;if(!norm||seen.has(key))return;seen.add(key);items.push({name:clean,phone:norm,role})};MEDICAL_PROVIDERS.forEach(p=>add(p.label,p.phone,'Medical Staff'));PSYCH_CORE_PROVIDERS.forEach(p=>add(p.label,p.phone,'Psychiatry Staff'));Object.entries(PROVIDER_PHONES).forEach(([name,phone])=>add(name,phone,'Available phone'));items.sort((a,b)=>a.name.localeCompare(b.name));root.innerHTML=`<div class="directory-list">${items.map(x=>`<div class="dir-card"><div><button class="person-name has-phone dir-name" data-name="${escapeHtml(x.name)}" data-phone="${escapeHtml(x.phone)}" onclick="openContactFromElement(this)">${escapeHtml(x.name)}</button><div class="dir-meta">${escapeHtml(x.role)}</div></div><div class="dir-phone">${escapeHtml(x.phone)}</div></div>`).join('')}</div>`}
function renderAll(){renderDaily();renderCalendar();renderDirectory();updateScreenTitle();updateDataFooter();applyStoredTextScale()}
function updateScreenTitle(){document.getElementById('screen-title').textContent=fmtShortTitle(dailyDate)}
function showMain(id){activeView=id;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');updateScreenTitle();updateDataFooter()}
function showScheduleMode(mode){scheduleMode=mode;document.querySelectorAll('.subview').forEach(v=>v.classList.remove('active'));document.getElementById('subview-'+mode).classList.add('active');document.getElementById('mode-daily').classList.toggle('active',mode==='daily');document.getElementById('mode-month').classList.toggle('active',mode==='month');showMain('schedule');renderAll()}
function moveDailyDate(delta){const d=new Date(dailyDate+'T12:00:00');d.setDate(d.getDate()+delta);dailyDate=d.toISOString().slice(0,10);renderDaily()}
function moveCalendarMonth(delta){calendarMonth+=delta;if(calendarMonth<0){calendarMonth=11;calendarYear--}if(calendarMonth>11){calendarMonth=0;calendarYear++}renderCalendar()}
function toggleMenu(show){document.getElementById('menu').classList.toggle('show',show)}function closeMenuFromBackdrop(e){if(e.target.id==='menu')toggleMenu(false)}
function openContactFromElement(el){openContact(el.dataset.name,el.dataset.phone)}
function openContact(name,phone){if(!phone)return;if(!isMobileContact())return;sheetContact={name,phone};document.getElementById('sheet-name').textContent=name;document.getElementById('sheet-phone').textContent=phone;document.getElementById('sheet-text').href='sms:'+phone;document.getElementById('sheet-call').href='tel:'+phone;document.getElementById('contact-sheet').classList.add('show')}
function hideContactSheet(){document.getElementById('contact-sheet').classList.remove('show')}function closeContactSheet(e){if(e.target.id==='contact-sheet')hideContactSheet()}
function addSheetContactToGroup(){if(sheetContact){selectedPhones.add(normalizePhone(sheetContact.phone));groupMode=true;hideContactSheet();renderDaily();showToast(sheetContact.name+' added to group text.')}}
function enableGroupMode(){groupMode=true;renderDaily()}function cancelGroupMode(){groupMode=false;selectedPhones.clear();renderDaily()}function syncSelectionFromCheckboxes(){selectedPhones=new Set([...document.querySelectorAll('.contact-check:checked')].map(cb=>normalizePhone(cb.dataset.phone)).filter(Boolean))}
function selectAllVisible(){document.querySelectorAll('.contact-check').forEach(cb=>{if(!cb.disabled)cb.checked=true});syncSelectionFromCheckboxes()}
function startGroupText(){syncSelectionFromCheckboxes();const nums=[...selectedPhones];if(!nums.length){showToast('Select at least one person.');return false}document.getElementById('group-start-btn').href='sms:'+nums.join(',');return true}
function openFeedback(){document.getElementById('feedback-modal').classList.add('show');setTimeout(()=>document.getElementById('feedback-text').focus(),50)}function hideFeedback(){document.getElementById('feedback-modal').classList.remove('show')}function closeFeedbackFromBackdrop(e){if(e.target.id==='feedback-modal')hideFeedback()}
async function submitFeedback(){const text=document.getElementById('feedback-text').value.trim();if(!text){showToast('Add feedback before sending.');return}const body=new URLSearchParams({action:'feedback',source:'jfk-med-staff-schedule-experimental-v2',feedback:text,page:location.href,timestamp:new Date().toISOString(),userAgent:navigator.userAgent});try{await fetch(DRIVE_EXEC_URL,{method:'POST',mode:'no-cors',body});document.getElementById('feedback-text').value='';hideFeedback();showToast('Feedback sent.')}catch(err){showToast('Could not send feedback from this browser.')}}
function applyStoredTextScale(){const saved=parseFloat(localStorage.getItem('jfkScheduleV2TextScale')||'1');document.documentElement.style.setProperty('--scale',String(Math.min(1.3,Math.max(.82,saved))))}function adjustTextSize(delta){const current=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--scale'))||1;const next=Math.min(1.3,Math.max(.82,+(current+delta).toFixed(2)));localStorage.setItem('jfkScheduleV2TextScale',String(next));document.documentElement.style.setProperty('--scale',String(next))}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>t.classList.remove('show'),3000)}
function dailySwipeEl(){return document.getElementById('subview-daily')}
function animateSwipeCommit(direction){const el=dailySwipeEl(),w=Math.max(window.innerWidth,document.documentElement.clientWidth||0);el.classList.remove('no-transition');el.style.transition='transform 240ms cubic-bezier(.22,.61,.36,1)';el.style.transform=`translateX(${direction<0?-w:w}px)`;setTimeout(()=>{moveDailyDate(direction<0?1:-1);el.classList.add('no-transition');el.style.transform=`translateX(${direction<0?w:-w}px)`;requestAnimationFrame(()=>{requestAnimationFrame(()=>{el.classList.remove('no-transition');el.style.transition='transform 240ms cubic-bezier(.22,.61,.36,1)';el.style.transform='translateX(0)'})})},245)}
function resetSwipe(){const el=dailySwipeEl();el.classList.remove('no-transition');el.style.transition='transform 180ms ease';el.style.transform='translateX(0)'}
function installSwipe(){const app=document.getElementById('app');app.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchLastX=touchStartX;swiping=false},{passive:true});app.addEventListener('touchmove',e=>{if(activeView!=='schedule'||scheduleMode!=='daily')return;if(document.getElementById('menu').classList.contains('show')||document.getElementById('contact-sheet').classList.contains('show'))return;const t=e.touches[0],dx=t.clientX-touchStartX,dy=t.clientY-touchStartY,w=Math.max(window.innerWidth,document.documentElement.clientWidth||0);if(Math.abs(dx)>12&&Math.abs(dx)>Math.abs(dy)*1.15){swiping=true;touchLastX=t.clientX;const el=dailySwipeEl();el.classList.add('no-transition');el.style.transform=`translateX(${Math.max(-w,Math.min(w,dx))}px)`;e.preventDefault()}},{passive:false});app.addEventListener('touchend',e=>{if(!swiping){resetSwipe();return}const dx=touchLastX-touchStartX;if(Math.abs(dx)>Math.min(120,window.innerWidth*.28)){animateSwipeCommit(dx)}else{resetSwipe()}swiping=false},{passive:true})}
applyStoredTextScale();installSwipe();loadFromDrive();
