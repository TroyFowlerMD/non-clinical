function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function nhead(v){return String(v||'').replace(/\.\d+$/,'').toLowerCase().replace(/[\r\n\s]+/g,' ').replace(/[^\w\s,]+/g,' ').replace(/\s+/g,' ').trim()}function ntext(v){return String(v||'').replace(/\([^)]*\)/g,' ').replace(/[^\w\s/@.-]/g,' ').replace(/\s+/g,' ').trim().toUpperCase()}function tc(v){return String(v||'').toLowerCase().replace(/\b[a-z]/g,c=>c.toUpperCase())}function displayName(v){let s=String(v||'').trim();if(!s)return'';const suf=s.match(/-([RF])$/i);if(suf)s=s.slice(0,-2);s=s.split(/\s+/).map(p=>p.includes('-')?p.split('-').map(tc).join('-'):tc(p)).join(' ');return s+(suf?'-'+suf[1].toUpperCase():'')}function cleanHeader(h){let v=String(h||'').replace(/\.\d+$/,'').trim().replace(/\s+MD$/i,'');if(v.includes(','))v=v.split(',')[0].trim();return displayName(v)}function phone(v){const d=String(v||'').replace(/\D/g,'');if(!d)return'';return d.length===10?'+1'+d:(d.length===11&&d.startsWith('1')?'+':'')+d}function sameHeader(h,e){const a=nhead(h),b=nhead(e);return a===b||a.replace(/\s+md$/,'')===b.replace(/\s+md$/,'')}function first(pred,start=0,end=RAW_HEADERS.length){for(let i=Math.max(0,start);i<Math.min(end,RAW_HEADERS.length);i++)if(pred(RAW_HEADERS[i],i))return i;return-1}function last(pred){for(let i=RAW_HEADERS.length-1;i>=0;i--)if(pred(RAW_HEADERS[i],i))return i;return-1}
function buildCols(headers){RAW_HEADERS=headers||[];const date=first(h=>nhead(h)==='date'),day=first(h=>['day of week','day of the week','day'].includes(nhead(h))),medRes=first(h=>nhead(h).includes('resident')||nhead(h).includes('fellowship')),psychRes=last(h=>nhead(h).includes('resident')||nhead(h).includes('fellowship')),overnight=first(h=>nhead(h).includes('med staff overnight')||nhead(h).includes('overnight coverage')),backup=first(h=>nhead(h).includes('back')&&nhead(h).includes('primary')),fast=first(h=>nhead(h).includes('clarification')||nhead(h).includes('fast track')),pharmacy=first(h=>nhead(h).includes('pharmacy')),date2=first((h,i)=>i>psychRes&&nhead(h)==='date');const med=MEDICAL.map((p,i)=>({...p,label:displayName(p.label),id:'med:'+p.label,order:i,col:first(h=>sameHeader(h,p.header),0,medRes>0?medRes:RAW_HEADERS.length)})).filter(p=>p.col>=0);const psychStart=pharmacy>=0?pharmacy+1:0,psychEnd=psychRes>=0?psychRes:RAW_HEADERS.length;const psych=PSYCH.map((p,i)=>({...p,label:displayName(p.label),id:'psych:'+p.label,order:i,col:first(h=>sameHeader(h,p.header),psychStart,psychEnd)})).filter(p=>p.col>=0);const skip=new Set([date,day,medRes,psychRes,overnight,backup,fast,pharmacy,date2].filter(i=>i>=0));for(let i=(psychRes>=0?psychRes+1:RAW_HEADERS.length);i<(date2>=0?date2:RAW_HEADERS.length);i++){if(skip.has(i))continue;const raw=RAW_HEADERS[i],nh=nhead(raw);if(!nh||/(date|day|overnight|back|pharmacy|fast|clarif|resident|fellow|call|coverage)/i.test(nh)||!/^[a-z][a-z\s,'-]+$/.test(nh))continue;const label=cleanHeader(raw);if(label&&!psych.some(p=>p.label===label))psych.push({header:raw,label,phone:PHONE[label]||'',id:'psych:'+label+':'+i,order:psych.length,col:i,sourceLabel:label==='Bandell'?'Psych column':''})}return{date,day,medRes,psychRes,overnight,backup,fast,pharmacy,med,psych}}
function parseDate(v){const s=String(v??'').trim();if(!s)return'';let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return`${m[1]}-${m[2]}-${m[3]}`;m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);if(m){const y=m[3].length===2?'20'+m[3]:m[3];return`${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`}const d=new Date(s);return Number.isNaN(d.getTime())?'':d.toISOString().slice(0,10)}function fmtDate(iso){const d=new Date(iso+'T12:00:00');return Number.isNaN(d.getTime())?iso:d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}function topTitle(){if(activeView==='directory')return'Directory';if(scheduleMode==='month')return new Date(calendarYear,calendarMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});const d=new Date(dailyDate+'T12:00:00');return Number.isNaN(d.getTime())?'Schedule':d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}function fmtAsOf(v){if(!v)return'—';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}function updateFooter(){document.getElementById('data-foot').innerHTML=`Schedule data as of <strong>${esc(fmtAsOf(dataMeta.asOf))}</strong>${dataMeta.label?' · '+esc(dataMeta.label):''}`}
function category(v){const n=ntext(v);if(!n||n.includes('POST CALL')||n.includes('POST-CALL')||n.includes('POSTCALL')||n.split(' ').includes('PC'))return null;if(['OFF','VAC','HOL','OUT','NO CALL','OFF NO CALL','CME','CPI','CSL','EPIC','GOV','JURY','RHA','ORIENT'].includes(n))return null;if(/\b(OFF|VAC|HOL|OUT|NO CALL|CME|CPI|CSL|EPIC|GOV|JURY|RHA|ORIENT)\b/.test(n))return null;if(n.includes('TEAM A'))return'Team A';if(n.includes('TEAM B'))return'Team B';if(n.includes('ARS-E'))return'ARS-E';if(n.includes('ARS-H'))return'ARS-H';if(/\bARS\b/.test(n))return'ARS-E';if(/\bADMIN\b/.test(n)||/\bWFH\b/.test(n))return'Admin';if(/\bSP\b/.test(n))return'SP';if(/\bFLEX\b/.test(n))return'Flex';if(/\bIN\b/.test(n)||/\bACU\b/.test(n)||/\bJFK\b/.test(n)||/\bBROUGHTON\b/.test(n)||/\bPRN\b/.test(n)||n.includes('FAST TRACK'))return'IN';return null}
function buildData(json,meta={}){COLS=buildCols(json.headers||[]);RAW_ROWS=json.rows||[];DATA=RAW_ROWS.map(row=>{const date=parseDate(row[COLS.date]);return date?{row,date,day:String(row[COLS.day]||''),medResRaw:COLS.medRes>=0?String(row[COLS.medRes]||'').trim():'',psychResRaw:COLS.psychRes>=0?String(row[COLS.psychRes]||'').trim():'',overnight:COLS.overnight>=0?String(row[COLS.overnight]||'').trim():'',backup:COLS.backup>=0?String(row[COLS.backup]||'').trim():'',fast:COLS.fast>=0?String(row[COLS.fast]||'').trim():'',pharmacy:COLS.pharmacy>=0?String(row[COLS.pharmacy]||'').trim():''}:null}).filter(Boolean).sort((a,b)=>a.date.localeCompare(b.date));const pref=DATA.find(r=>r.date===TODAY)||DATA.find(r=>r.date>=TODAY)||DATA[DATA.length-1]||DATA[0];if(pref){dailyDate=pref.date;const d=new Date(pref.date+'T12:00:00');calendarYear=d.getFullYear();calendarMonth=d.getMonth()}dataMeta={asOf:meta.asOf||json.updatedAt||json.modifiedTime||json.lastModified||json.lastUpdated||json.fetchedAt||new Date().toISOString(),label:meta.label||''};localStorage.setItem(CACHE_META_KEY,JSON.stringify(dataMeta));updateFooter()}
async function loadFromDrive(){try{const res=await fetch(DRIVE_EXEC_URL+(DRIVE_EXEC_URL.includes('?')?'&':'?')+'_cb='+Date.now());if(!res.ok)throw new Error('HTTP '+res.status);const json=await res.json();if(json.error)throw new Error(json.error);localStorage.setItem(CACHE_KEY,JSON.stringify(json));buildData(json,{label:'Google Sheet'});renderAll()}catch(e){const c=localStorage.getItem(CACHE_KEY);if(c){buildData(JSON.parse(c),JSON.parse(localStorage.getItem(CACHE_META_KEY)||'{}'));renderAll();showToast('Using cached schedule data.')}else document.getElementById('daily-root').innerHTML='<div class="empty">Error loading schedule.</div>'}}
function rowsToJson(rows){const clean=rows.map(r=>r.map(v=>String(v??'').trim())).filter(r=>r.some(Boolean));if(clean.length<2)throw new Error('File did not contain enough rows.');return{headers:clean[0],rows:clean.slice(1),fetchedAt:new Date().toISOString()}}function parseDelimited(text){const rows=[];let row=[],cell='',q=false;for(let i=0;i<text.length;i++){const ch=text[i],nx=text[i+1];if(ch==='"'){if(q&&nx==='"'){cell+='"';i++}else q=!q}else if(!q&&(ch===','||ch==='\t')){row.push(cell);cell=''}else if(!q&&(ch==='\n'||ch==='\r')){if(ch==='\r'&&nx==='\n')i++;row.push(cell);if(row.some(x=>String(x).trim()))rows.push(row);row=[];cell=''}else cell+=ch}row.push(cell);if(row.some(x=>String(x).trim()))rows.push(row);return rows}function triggerScheduleUpload(){toggleMenu(false);const inp=document.getElementById('schedule-file-input');inp.value='';inp.click()}function handleScheduleFile(file){if(!file)return;const asOf=file.lastModified?new Date(file.lastModified).toISOString():new Date().toISOString(),label='Uploaded file: '+file.name;if(/\.xlsx?$/i.test(file.name)){if(!window.XLSX){showToast('Spreadsheet parser unavailable. Try CSV.');return}const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'}),ws=wb.Sheets[wb.SheetNames[0]],json=rowsToJson(XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''}));localStorage.setItem(CACHE_KEY,JSON.stringify(json));buildData(json,{asOf,label});renderAll();showToast('Uploaded schedule loaded.')}catch(err){showToast('Could not parse upload: '+err.message)}};r.readAsArrayBuffer(file)}else{const r=new FileReader();r.onload=e=>{try{const json=rowsToJson(parseDelimited(e.target.result));localStorage.setItem(CACHE_KEY,JSON.stringify(json));buildData(json,{asOf,label});renderAll();showToast('Uploaded schedule loaded.')}catch(err){showToast('Could not parse upload: '+err.message)}};r.readAsText(file)}}
function record(iso=dailyDate){return DATA.find(r=>r.date===iso)||null}function providerAssignment(r,p){return(!r||p.col<0)?'':String(r.row[p.col]||'').trim()}function order(c){const i=ORDER.indexOf(c);return i<0?999:i}function providers(r,list){return list.map((p,i)=>{const c=category(providerAssignment(r,p));return c?{name:displayName(p.label),phone:p.phone||PHONE[p.label]||'',category:c,sourceLabel:p.sourceLabel||'',order:i}:null}).filter(Boolean).sort((a,b)=>(order(a.category)-order(b.category))||(a.order-b.order)||a.name.localeCompare(b.name))}function residents(raw){return String(raw||'').split(/[\/,;]+/).map(t=>t.trim().replace(/\s+(AM|PM)\b.*$/i,'').replace(/[\s.;,]+$/,'')).filter(Boolean).map(t=>{const m=t.match(/^([A-Za-z][A-Za-z'\-\s.]*?)(?:\s*-\s*([RF]))?\b/i);const name=m?displayName(m[1].trim())+(m[2]?'-'+m[2].toUpperCase():''):displayName(t),base=name.replace(/-[RF]$/,'');return{name,phone:PHONE[base]||''}})}function dayData(r){return{psych:providers(r,COLS.psych||[]),med:providers(r,COLS.med||[]),psychRes:residents(r?.psychResRaw),medRes:residents(r?.medResRaw)}}
function person(p){const ph=phone(p.phone),checked=selectedPhones.has(ph),cb=ph?`<input class="contact-check" data-phone="${esc(ph)}" onchange="syncSelectionFromCheckboxes()" type="checkbox" ${checked?'checked':''}>`:'';const source=p.sourceLabel?`<span class="source-badge">${esc(p.sourceLabel)}</span>`:'';return`<span class="person">${cb}<button class="person-name ${ph?'has-phone':''}" data-name="${esc(p.name)}" data-phone="${esc(ph)}" onclick="openContactFromElement(this)">${esc(p.name)}</button>${source}</span>`}function people(arr){return`<div class="person-list">${arr.map(person).join('')}</div>`}function rows(cats,d){return cats.map(c=>{const p=d.psych.filter(x=>x.category===c),m=d.med.filter(x=>x.category===c);return(!p.length&&!m.length)?'':`<div class="ledger-row"><div class="row-label">${esc(c)}</div>${people(p)}${people(m)}</div>`}).join('')}function section(title,cls,body){return body?`<section class="section ${cls}"><div class="section-head"><div class="section-title">${esc(title)}</div><div class="section-col">Psych</div><div class="section-col">Medical</div></div><div class="ledger">${body}</div></section>`:''}function staffType(name){const n=displayName(name);if((COLS.psych||[]).some(p=>p.label===n)||PSYCH.some(p=>p.label===n))return'psych';if((COLS.med||[]).some(p=>p.label===n)||MEDICAL.some(p=>p.label===n))return'med';return'psych'}function covTokens(v){return String(v||'').split(/[\/,;]+/).map(x=>displayName(x.trim())).filter(Boolean)}function covRow(label,v){const psych=[],med=[];covTokens(v).forEach(n=>{const item={name:n,phone:PHONE[n]||''};(staffType(n)==='med'?med:psych).push(item)});return(!psych.length&&!med.length)?'':`<div class="ledger-row"><div class="row-label">${esc(label)}</div>${people(psych)}${people(med)}</div>`}
function buildDailyHTML(date){const r=record(date);if(!r)return'<div class="empty">No schedule data found.</div>';const d=dayData(r),acu=rows(['Team A','Team B'],d),ars=rows(['ARS-E','ARS-H'],d),res=(d.psychRes.length||d.medRes.length)?`<div class="ledger-row"><div class="row-label"></div>${people(d.psychRes)}${people(d.medRes)}</div>`:'',other=rows(['IN','Admin','SP','Flex'],d),cov=covRow('Overnight',r.overnight)+covRow('Backup',r.backup)+covRow('Fast Track',r.fast)+covRow('Pharmacy',r.pharmacy);let html='';html+=section('ACU','acu',acu);html+=section('ARS','ars',ars);html+=section('Residents / Fellows','res',res);html+=section((!acu&&!ars&&other)?'IN':'Other','other',other);html+=section('Coverage','coverage',cov);return html||'<div class="empty">No displayable assignments.</div>'}function renderDaily(){updateTitle();updateFooter();document.getElementById('daily-root').innerHTML=buildDailyHTML(dailyDate);document.body.classList.toggle('group-mode',groupMode)}
function calendarItems(r){if(!r)return[];const d=dayData(r),items=[];const push=(cats,type)=>cats.forEach(c=>{d.psych.filter(p=>p.category===c).forEach(p=>items.push({name:p.name,type}));d.med.filter(p=>p.category===c).forEach(p=>items.push({name:p.name,type}))});push(['Team A','Team B'],'acu');push(['ARS-E','ARS-H'],'ars');d.psychRes.forEach(x=>items.push({name:x.name,type:'res'}));d.medRes.forEach(x=>items.push({name:x.name,type:'res'}));push(['IN','Admin','SP','Flex'],'other');return items}function renderCalendar(){const title=document.getElementById('month-title'),first=new Date(calendarYear,calendarMonth,1);title.textContent=first.toLocaleDateString('en-US',{month:'long',year:'numeric'});updateTitle();const start=new Date(calendarYear,calendarMonth,1);start.setDate(1-start.getDay());let cells='',dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('');for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const iso=d.toISOString().slice(0,10),items=calendarItems(record(iso));cells+=`<div class="cal-cell ${d.getMonth()!==calendarMonth?'other-month':''} ${iso===TODAY?'today':''}" onclick="dailyDate='${iso}';showScheduleMode('daily')"><div class="cal-date">${d.getDate()}</div><div class="cal-names">${items.map(x=>`<div class="cal-name ${x.type}">${esc(x.name)}</div>`).join('')}</div></div>`}document.getElementById('calendar-root').innerHTML=`<div class="calendar-wrap"><div class="cal-grid">${dows}${cells}</div></div>`}function renderDirectory(){const seen=new Set(),site=[],primary=[];const add=(bucket,name,ph)=>{const n=displayName(name),p=phone(ph),key=n+'|'+p;if(p&&!seen.has(key)){seen.add(key);bucket.push({name:n,phone:p})}};PSYCH.forEach(p=>add(site,p.label,p.phone));MEDICAL.forEach(p=>add(primary,p.label,p.phone));Object.entries(PHONE).forEach(([n,p])=>{if(!site.some(x=>x.name===displayName(n))&&!primary.some(x=>x.name===displayName(n)))add(site,n,p)});site.sort((a,b)=>a.name.localeCompare(b.name));primary.sort((a,b)=>a.name.localeCompare(b.name));const block=(title,items)=>items.length?`<section class="dir-section"><div class="dir-head">${esc(title)}</div><div class="dir-grid">${items.map(x=>`<div class="dir-item"><button class="person-name has-phone dir-name" data-name="${esc(x.name)}" data-phone="${esc(x.phone)}" onclick="openContactFromElement(this)">${esc(x.name)}</button><div class="dir-phone">${esc(x.phone)}</div></div>`).join('')}</div></section>`:'';document.getElementById('directory-root').innerHTML=`<div class="directory">${block('Site providers',site)}${block('Primary care providers',primary)}</div>`}function renderAll(){renderDaily();renderCalendar();renderDirectory();applyStoredTextScale()}
function updateTitle(){document.getElementById('screen-title').textContent=activeView==='directory'?'Directory':(scheduleMode==='month'?new Date(calendarYear,calendarMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}):topTitle())}function showMain(id){activeView=id;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active');updateTitle()}function showScheduleMode(mode){scheduleMode=mode;document.querySelectorAll('.subview').forEach(v=>v.classList.remove('active'));document.getElementById('subview-'+mode).classList.add('active');document.getElementById('mode-daily').classList.toggle('active',mode==='daily');document.getElementById('mode-month').classList.toggle('active',mode==='month');showMain('schedule');renderAll()}function addDays(iso,delta){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+delta);return d.toISOString().slice(0,10)}function moveDailyDate(delta){dailyDate=addDays(dailyDate,delta);renderDaily()}function moveCalendarMonth(delta){calendarMonth+=delta;if(calendarMonth<0){calendarMonth=11;calendarYear--}if(calendarMonth>11){calendarMonth=0;calendarYear++}renderCalendar()}
function toggleMenu(show){document.getElementById('menu').classList.toggle('show',show)}function closeMenuFromBackdrop(e){if(e.target.id==='menu')toggleMenu(false)}function openContactFromElement(el){openContact(el.dataset.name,el.dataset.phone)}function openContact(name,ph){if(!ph||!matchMedia('(max-width:760px),(pointer:coarse)').matches)return;sheetContact={name,phone:ph};document.getElementById('sheet-name').textContent=name;document.getElementById('sheet-phone').textContent=ph;document.getElementById('sheet-text').href='sms:'+ph;document.getElementById('sheet-call').href='tel:'+ph;document.getElementById('contact-sheet').classList.add('show')}function hideContactSheet(){document.getElementById('contact-sheet').classList.remove('show')}function closeContactSheet(e){if(e.target.id==='contact-sheet')hideContactSheet()}function addSheetContactToGroup(){if(sheetContact){selectedPhones.add(phone(sheetContact.phone));groupMode=true;hideContactSheet();renderDaily();showToast(sheetContact.name+' added to group text.')}}function enableGroupMode(){groupMode=true;renderDaily()}function cancelGroupMode(){groupMode=false;selectedPhones.clear();renderDaily()}function syncSelectionFromCheckboxes(){selectedPhones=new Set([...document.querySelectorAll('.contact-check:checked')].map(cb=>phone(cb.dataset.phone)).filter(Boolean))}function selectAllVisible(){document.querySelectorAll('.contact-check').forEach(cb=>cb.checked=true);syncSelectionFromCheckboxes()}function startGroupText(){syncSelectionFromCheckboxes();const nums=[...selectedPhones];if(!nums.length){showToast('Select at least one person.');return false}document.getElementById('group-start-btn').href='sms:'+nums.join(',');return true}
function openFeedback(){document.getElementById('feedback-modal').classList.add('show');setTimeout(()=>document.getElementById('feedback-text').focus(),50)}function hideFeedback(){document.getElementById('feedback-modal').classList.remove('show')}function closeFeedbackFromBackdrop(e){if(e.target.id==='feedback-modal')hideFeedback()}async function submitFeedback(){const text=document.getElementById('feedback-text').value.trim();if(!text){showToast('Add feedback before sending.');return}try{await fetch(DRIVE_EXEC_URL,{method:'POST',mode:'no-cors',body:new URLSearchParams({action:'feedback',source:'jfk-med-staff-schedule-experimental-v2',feedback:text,page:location.href,timestamp:new Date().toISOString(),userAgent:navigator.userAgent})});document.getElementById('feedback-text').value='';hideFeedback();showToast('Feedback sent.')}catch(e){showToast('Could not send feedback from this browser.')}}function applyStoredTextScale(){document.documentElement.style.setProperty('--scale',String(Math.min(1.3,Math.max(.82,parseFloat(localStorage.getItem('jfkScheduleV2TextScale')||'1')))))}function adjustTextSize(d){const cur=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--scale'))||1,next=Math.min(1.3,Math.max(.82,+(cur+d).toFixed(2)));localStorage.setItem('jfkScheduleV2TextScale',String(next));applyStoredTextScale()}function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>t.classList.remove('show'),3000)}
function root(){return document.getElementById('daily-root')}function stage(){return document.getElementById('daily-stage')}function ensureGhost(dir,dx=0){if(swipeGhost&&swipeDir===dir)return;clearGhost();swipeDir=dir;const w=innerWidth,next=addDays(dailyDate,dir<0?1:-1);swipeGhost=document.createElement('div');swipeGhost.className='daily-ghost';swipeGhost.innerHTML=buildDailyHTML(next);swipeGhost.style.transform=`translateX(${dir<0?w+dx:-w+dx}px)`;stage().appendChild(swipeGhost)}function clearGhost(){if(swipeGhost){swipeGhost.remove();swipeGhost=null;swipeDir=0}}function resetSwipe(){const r=root();r.classList.remove('no-transition');r.style.transition='transform 180ms ease';r.style.transform='translateX(0)';if(swipeGhost){swipeGhost.style.transition='transform 180ms ease';swipeGhost.style.transform=`translateX(${swipeDir<0?innerWidth:-innerWidth}px)`;setTimeout(clearGhost,190)}}function commitSwipe(dir){const r=root(),w=innerWidth;ensureGhost(dir);r.classList.remove('no-transition');swipeGhost.classList.remove('no-transition');r.style.transition=swipeGhost.style.transition='transform 260ms cubic-bezier(.22,.61,.36,1)';requestAnimationFrame(()=>{r.style.transform=`translateX(${dir<0?-w:w}px)`;swipeGhost.style.transform='translateX(0)'});setTimeout(()=>{dailyDate=addDays(dailyDate,dir<0?1:-1);r.style.transition='none';r.style.transform='translateX(0)';clearGhost();renderDaily()},270)}function installSwipe(){const app=document.getElementById('app');app.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchLastX=touchStartX;swiping=false},{passive:true});app.addEventListener('touchmove',e=>{if(activeView!=='schedule'||scheduleMode!=='daily'||document.getElementById('menu').classList.contains('show')||document.getElementById('contact-sheet').classList.contains('show'))return;const t=e.touches[0],dx=t.clientX-touchStartX,dy=t.clientY-touchStartY,w=innerWidth;if(Math.abs(dx)>12&&Math.abs(dx)>Math.abs(dy)*1.15){swiping=true;touchLastX=t.clientX;const dir=dx<0?-1:1;ensureGhost(dir,dx);const r=root();r.classList.add('no-transition');r.style.transform=`translateX(${Math.max(-w,Math.min(w,dx))}px)`;if(swipeGhost){swipeGhost.classList.add('no-transition');swipeGhost.style.transform=`translateX(${dir<0?w+dx:-w+dx}px)`}e.preventDefault()}},{passive:false});app.addEventListener('touchend',()=>{if(!swiping){resetSwipe();return}const dx=touchLastX-touchStartX;if(Math.abs(dx)>Math.min(120,innerWidth*.28))commitSwipe(dx<0?-1:1);else resetSwipe();swiping=false},{passive:true})}
applyStoredTextScale();installSwipe();loadFromDrive();
